<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sideline — Live Tagger</title>
<style>
  :root{
    --bg: #0a0e14;
    --panel: #131a24;
    --panel-2: #1a2330;
    --line: #263140;
    --text: #edeff2;
    --muted: #7c8797;
    --amber: #ffb627;
    --amber-dim: #4d3a14;
    --green: #3fa34d;
    --green-dim: #16321c;
    --red: #e5484d;
    --red-dim: #3a1618;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: 40px;
  }
  .scoreboard{
    position: sticky; top:0; z-index:20;
    background: linear-gradient(#0d1420, #0a0e14 90%);
    border-bottom: 2px solid var(--line);
    padding: 14px 16px 10px;
  }
  .sb-row{ display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .sb-label{ font-size:11px; letter-spacing:.14em; color:var(--muted); text-transform:uppercase; font-weight:700; }
  .sb-main{ display:flex; align-items:baseline; gap:10px; margin-top:2px; }
  .sb-dd{
    font-family: "SFMono-Regular", Menlo, monospace; font-weight:700;
    font-size:40px; letter-spacing:.02em; color:var(--amber);
    text-shadow: 0 0 18px rgba(255,182,39,.35);
  }
  .sb-score{ font-family: "SFMono-Regular", Menlo, monospace; font-size:15px; color:var(--text); font-weight:700;}
  .sb-sub{ font-size:12px; color:var(--muted); }
  .filter-pill{
    display:flex; gap:6px; background:var(--panel); border:1px solid var(--line);
    border-radius:999px; padding:4px;
  }
  .filter-pill button{
    border:none; background:transparent; color:var(--muted); font-weight:700;
    font-size:12px; padding:6px 10px; border-radius:999px;
  }
  .filter-pill button.active{ background:var(--amber); color:#1a1200; }

  .tabs{ display:flex; gap:4px; padding:10px 12px 0; overflow-x:auto; }
  .tabs button{
    flex:1; min-width:64px; padding:10px 4px; border-radius:10px 10px 0 0; border:none;
    background:var(--panel); color:var(--muted); font-weight:700; font-size:12px;
    letter-spacing:.02em; white-space:nowrap;
  }
  .tabs button.active{ background:var(--panel-2); color:var(--amber); }

  main{ padding:14px 16px 10px; }
  .card{ background:var(--panel-2); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; }
  .section-label{ font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;}
  .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(84px,1fr)); gap:8px; }
  .tile{
    min-height:56px; border-radius:12px; border:1px solid var(--line); background:var(--panel);
    color:var(--text); font-weight:700; font-size:16px; padding:8px 6px;
    display:flex; align-items:center; justify-content:center; text-align:center;
    line-height:1.15; overflow-wrap:break-word; word-break:break-word; hyphens:auto;
  }
  .tile.small{ min-height:48px; font-size:14px; }
  .tile.wide{ min-height:64px; font-size:18px; }
  .tile.selected{ background:var(--amber); color:#1a1200; border-color:var(--amber); }
  .tile.selected.green{ background:var(--green); color:#08150a; border-color:var(--green); }
  .tile.selected.red{ background:var(--red); color:#2a0708; border-color:var(--red); }
  .tile:disabled{ opacity:.35; }

  .log-btn{
    width:100%; padding:18px; border-radius:14px; border:none; font-weight:800;
    font-size:18px; letter-spacing:.03em; background:var(--green); color:#08150a; margin-top:4px;
  }
  .log-btn:disabled{ background:var(--panel); color:var(--muted); }
  .undo-btn{
    width:100%; padding:12px; border-radius:12px; border:1px solid var(--line);
    background:var(--panel); color:var(--muted); font-weight:700; margin-top:8px; font-size:14px;
  }

  .recent{ font-size:13px; color:var(--muted); }
  .recent .row{ display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--line); }
  .recent .row:last-child{ border-bottom:none; }

  textarea{
    width:100%; min-height:110px; background:var(--panel); border:1px solid var(--line);
    color:var(--text); border-radius:10px; padding:10px; font-family:monospace; font-size:13px;
  }
  .hint{ font-size:12px; color:var(--muted); margin:6px 0 10px; line-height:1.4; }
  .row-btns{ display:flex; gap:8px; }
  .row-btns button{ flex:1; padding:12px; border-radius:10px; border:none; font-weight:700; }
  .btn-primary{ background:var(--amber); color:#1a1200; }
  .btn-secondary{ background:var(--panel); color:var(--text); border:1px solid var(--line) !important; }

  table{ width:100%; border-collapse:collapse; font-size:12px; }
  th,td{ border:1px solid var(--line); padding:6px; text-align:center; }
  th{ background:var(--panel); color:var(--muted); font-size:10px; text-transform:uppercase; }
  .scroll-x{ overflow-x:auto; }

  .stat-row{ display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line); }
  .stat-row:last-child{ border-bottom:none; }
  .stat-name{ font-size:14px; }
  .stat-bar-wrap{ flex:1; margin:0 10px; height:8px; background:var(--panel); border-radius:6px; overflow:hidden; }
  .stat-bar{ height:100%; background:var(--amber); }
  .stat-pct{ font-family:monospace; font-weight:700; min-width:52px; text-align:right; }

  .empty{ color:var(--muted); font-size:13px; text-align:center; padding:20px 10px; }
  h2.title{ font-size:16px; margin:0 0 4px; }
  .badge{ font-size:10px; background:var(--amber-dim); color:var(--amber); padding:3px 8px; border-radius:999px; font-weight:700; }
  .toggle-row{ display:flex; gap:8px; }
  .toggle{ flex:1; min-height:46px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--muted); font-weight:800; font-size:13px; }
  .toggle.on-td{ background:var(--amber); color:#1a1200; border-color:var(--amber); }
  .toggle.on-to{ background:var(--red); color:#2a0708; border-color:var(--red); }
  .fav-chip{ display:inline-flex; align-items:center; gap:4px; padding:8px 12px; margin:3px; border-radius:999px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:13px; font-weight:600; }
  .fav-chip.fav{ background:var(--amber-dim); color:var(--amber); border-color:var(--amber); }
  .export-warn{ font-size:11px; color:var(--amber); margin-top:4px; }
</style>
</head>
<body>

<div class="scoreboard">
  <div class="sb-row">
    <div>
      <div class="sb-label" id="sbLabel">Next Snap</div>
      <div class="sb-main">
        <div class="sb-dd" id="sbDD">1st &amp; 10</div>
      </div>
      <div class="sb-sub" id="sbSub">Play 1 &middot; No plays logged yet</div>
      <div id="sbDriveFlag" style="font-family:'SFMono-Regular',Menlo,monospace; font-size:12px; color:var(--amber); font-weight:700; margin-top:2px;"></div>
      <button class="undo-btn" id="sbFieldDirBtn" style="width:auto; padding:4px 10px; margin-top:6px; font-size:11px;" onclick="toggleFieldDirection()"></button>
    </div>
    <div style="text-align:right;">
      <div class="sb-score" id="sbTeamStats">0 yds &middot; 0 TD &middot; 0 TO</div>
      <div id="sbQuarter" style="margin-top:6px; display:flex; gap:4px; justify-content:flex-end;"></div>
      <div style="display:flex; gap:6px;">
        <button class="undo-btn" style="width:auto; padding:8px 12px; margin-top:6px;" onclick="editStart()">Down/Dist</button>
        <button class="undo-btn" style="width:auto; padding:8px 12px; margin-top:6px;" onclick="logNoPlay()">No Play</button>
      </div>
    </div>
  </div>
</div>

<div class="tabs">
  <button id="tab-setup" class="active" onclick="setTab('setup')">Roster/Plays</button>
  <button id="tab-tag" onclick="setTab('tag')">Tag</button>
  <button id="tab-tendencies" onclick="setTab('tendencies')">Tendencies</button>
  <button id="tab-boxscore" onclick="setTab('boxscore')">Box Score</button>
  <button id="tab-export" onclick="setTab('export')">Export</button>
</div>

<main id="main"></main>

<script>
// ---------------- STATE ----------------
const DEFAULT_FORMATIONS = ["Right","Left","Roger","Larry","Other"];
const DEFAULT_DEF_FORMATIONS = ["King","Queen","Trips","Pro","Other"];
const OFF_DEF_PLAY_TYPES = ["Run","Pass","Sack","Penalty"];
const KICK_PLAY_TYPES = ["Punt","Kickoff","FG","Onside"];
const PAT_PLAY_TYPES = ["PAT Kick","2pt Run","2pt Pass"];
const NOTABLE_EVENTS = [
  "Bad Snap",
  "Fumble Lost",
  "Fumble Recovered by Offense",
  "Blocked Punt",
  "Blocked FG/PAT",
  "Muffed Punt/Kick Return",
  "Delay of Game",
  "Illegal Formation/Motion",
  "Roughing the Kicker/Passer",
  "Targeting/Ejection",
  "Other (type below)",
];

// Stunt/pressure calls, conditional on which Front is in (30 vs 40 front have different vocabularies).
// Common WI HS football fouls, most-frequent ones up top per the reference app's design.
const PENALTY_FOUL_TYPES = [
  "Holding (Offense)","Holding (Defense)","False Start","Offside/Encroachment",
  "Pass Interference (Offense)","Pass Interference (Defense)","Personal Foul",
  "Unsportsmanlike Conduct","Facemask","Roughing the Passer","Roughing the Kicker",
  "Delay of Game","Illegal Motion/Formation","Illegal Block/Chop Block",
  "Intentional Grounding","Ineligible Man Downfield","Targeting",
  "?","Other (type below)",
];
const PENALTY_RESULTS = ["5 Yards","10 Yards","15 Yards","Loss of Down","Automatic First Down","Offsetting","Declined","No Play","?"];
const STUNTS_30 = ["Strong","Slant","Pinch","Saw","Storm","Mow","?","Other (type below)"];
const STUNTS_40 = ["Base","Pinch","Bump","Slant","Flex","Alpha","Fist","Storm","Saw","Mike","Mow","Bear","Show Bear","Cross Bear","Axe Sam","Whip","4","?","Other (type below)"];
const STUNTS_FALLBACK = ["?","Other (type below)"]; // used when Front is 50 or not yet selected

const state = {
  // Default/base roster -- last year's team, will change. Favorites pre-set per priority:
  // Check + Roberts on top for carries, Check on top for pass attempts, Hackbarth on top for catches.
  roster: {
    QB: ["Tommy Check"],
    RB: ["Tommy Check","Maxim Roberts","Jameson Degenhardt"],
    WR: ["Hackbarth","Hudson Davis"],
    K: ["Sam King"],
    P: ["Tommy Check"],
    DEF: ["Ben Spears","Jameson Degenhardt"],
  },
  oppRoster: {}, // { "RB": ["3 David Irvin", ...], "QB":[...], "WR":[...] } -- editable each week, opponent's own players
  schedule: [], // [{opponent, date}, ...] -- season schedule, one tap to start a new game from this list
  pendingNewGameIndex: null,
  confirmingNewGame: false,
  playbook: {},      // { "Formation Name": ["Play A","Play B"] } -- OFFENSIVE formations/plays
  // Placeholder plays per defensive formation -- swap these for real calls whenever ready.
  defPlaybook: {
    King: ["Play A","Play B","Play C"],
    Queen: ["Play D","Play E","Play F"],
    Trips: ["Play G","Play H","Play I"],
    Pro: ["Play J","Play K","Play L"],
  },
  plays: [],          // logged rows
  cur: {},            // in-progress selections
  tab: 'setup',
  tendencyFilter: 'D',
  manualDown: 1,
  manualDistance: 10,
  editingStart: false,
  confirmingEndDrive: false,
  reviewFilterUnknown: false,
  reviewSelected: {},
  batchEditField: '',
  batchEditValue: '',
  favorites: { "Tommy Check": true, "Maxim Roberts": true, "Hackbarth": true },      // { "Smith": true }
  lastExportAt: 0,     // count of plays at last export/share
  nextSituation: { mode:'dd', down:1, distance:10, forcedOdk:null },
  lastActionNote: '',  // shown as a dismissible banner after an auto-transition
  teamName: 'Logan',
  ourColor: '#E3002B',
  oppColor: '#5B2C82',
  opponentName: 'Opponent',
  gameDate: '',
  quarter: '1',
  fieldDirection: 'right', // 'right' = our offense driving left-to-right on screen, 'left' = right-to-left
  showToStrength: true,
  showToBoundary: true,
  showToTE: true,
  showToFB: true,
  showTackleCredit: true,
  showMotion: false,           // default OFF per request
  showMotionToStrength: false, // only meaningful/shown when showMotion is on
  showMotionToBoundary: false, // only meaningful/shown when showMotion is on
  showFront: true,
  showClock: false,
  showYardLine: false,
  showHowToGuide: false,
  repeatLastFields: { formation: true, hash: true, direction: true, strength: true },
  showCoverage: true,
  showStunt: true,
  showDefPlay: true,
  contentMode: 'tagstats',     // 'tag' | 'stats' | 'tagstats'
  appMode: 'live', // 'live' | 'scout'
  hudlImport: null, // { headers, rows, mapping, teamCol, teamOValue, teamDValue } while a Hudl file is being mapped, before commit
  lastHudlMapping: null, // { mapping, teamCol } remembered within this session so re-uploading a similarly-shaped file doesn't need re-mapping
};

// ---------------- HELPERS ----------------
function lastPlay(){ return state.plays.length ? state.plays[state.plays.length-1] : null; }
function lastMeaningfulPlay(){
  for(let i=state.plays.length-1; i>=0; i--){
    if(state.plays[i].playType !== 'No Play') return state.plays[i];
  }
  return null;
}

// Computes drive/play numbering for the UPCOMING snap, for cross-referencing with film later
// (e.g. "O DRIVE: 2  PLAY: 4  |  PLAY 62" = 4th play of the 2nd offensive drive, 62nd play overall).
function computeDriveInfo(){
  const nextOdk = state.nextSituation.forcedOdk || state.cur.odk || '';
  let driveNumber = 0, playInDrive = 0, lastSide = null;
  state.plays.forEach(p=>{
    if(p.odk === 'O' || p.odk === 'D'){
      if(p.odk !== lastSide){ driveNumber++; playInDrive = 1; lastSide = p.odk; }
      else { playInDrive++; }
    }
  });
  let nextDriveNumber = driveNumber, nextPlayInDrive = playInDrive;
  if(nextOdk === 'O' || nextOdk === 'D'){
    if(nextOdk !== lastSide){ nextDriveNumber = driveNumber + 1; nextPlayInDrive = 1; }
    else { nextPlayInDrive = playInDrive + 1; }
  }
  return { side: nextOdk, driveNumber: nextDriveNumber, playInDrive: nextPlayInDrive, totalPlayNumber: state.plays.length + 1 };
}

function flipOdk(o){
  if(o === 'O') return 'D';
  if(o === 'D') return 'O';
  return o;
}

// Given a just-logged row, figure out what the NEXT situation should be.
function computeNextSituation(row){
  if(!row) return { mode:'dd', down: state.manualDown, distance: state.manualDistance, forcedOdk: null };

  // A safety sends the team that gave it up straight to a free kick — no PAT step.
  if(row.isSafety){
    return { mode:'special', label:'Free Kick', forcedOdk:'K', pendingReceiver: flipOdk(row.odk) };
  }
  // A touchdown always leads to a PAT/2pt attempt next, regardless of who scored.
  if(row.isTD){
    return { mode:'special', label:'PAT / 2PT', forcedOdk:'PAT', pendingReceiver: flipOdk(row.odk) };
  }
  // After the PAT/2pt attempt, the scoring team kicks off.
  if(row.odk === 'PAT'){
    return { mode:'special', label:'Kickoff', forcedOdk:'K', pendingReceiver: row.pendingReceiver };
  }
  // After any kicking play, whoever receives starts a fresh 1st & 10.
  if(row.odk === 'K'){
    return { mode:'dd', down:1, distance:10, forcedOdk: row.pendingReceiver || row.odk };
  }
  // Manually-marked turnover (fumble/INT/etc.) flips possession immediately.
  if(row.isTurnover){
    return { mode:'dd', down:1, distance:10, forcedOdk: flipOdk(row.odk) };
  }
  const gain = row.gain;
  if(gain === null || gain === undefined || isNaN(gain)){
    return { mode:'dd', down: row.down, distance: row.distance, forcedOdk: row.odk };
  }
  if(gain >= row.distance){
    return { mode:'dd', down:1, distance:10, forcedOdk: row.odk };
  }
  if(row.down === 4){
    // Turnover on downs is a possession change too.
    return { mode:'dd', down:1, distance:10, forcedOdk: flipOdk(row.odk), turnoverOnDowns:true };
  }
  return { mode:'dd', down: row.down+1, distance: row.distance-gain, forcedOdk: row.odk };
}

function fmtDD(d,dist){
  const ord = {1:'1st',2:'2nd',3:'3rd',4:'4th'}[d] || (d+'th');
  return `${ord} & ${dist}`;
}

function csvEscape(v){
  v = (v===undefined||v===null) ? '' : String(v);
  if(v.includes(',') || v.includes('"') || v.includes('\n')){
    return '"' + v.replace(/"/g,'""') + '"';
  }
  return v;
}

function escAttr(v){
  return String(v).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---------------- PARSING ----------------
function parseKeyList(text){
  const out = {};
  text.split('\n').forEach(line=>{
    line = line.trim();
    if(!line) return;
    const idx = line.indexOf(':');
    if(idx===-1) return;
    const key = line.slice(0,idx).trim();
    const vals = line.slice(idx+1).split(',').map(s=>s.trim()).filter(Boolean);
    if(key && vals.length) out[key] = vals;
  });
  return out;
}

function parseCSVLine(line){
  const result = []; let cur=''; let inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch = line[i];
    if(inQuotes){
      if(ch === '"'){ if(line[i+1] === '"'){ cur+='"'; i++; } else { inQuotes=false; } }
      else cur += ch;
    } else {
      if(ch === '"') inQuotes = true;
      else if(ch === ','){ result.push(cur); cur=''; }
      else cur += ch;
    }
  }
  result.push(cur);
  return result;
}

function detectRosterFormat(text){
  const firstLine = text.split('\n').map(l=>l.trim()).filter(Boolean)[0] || '';
  const colonIdx = firstLine.indexOf(':');
  const commaIdx = firstLine.indexOf(',');
  if(colonIdx !== -1 && (commaIdx === -1 || colonIdx < commaIdx)) return 'label';
  return 'csv';
}

function parseRosterCSV(text){
  // Expects rows of Position,Name (a header row like "Position,Name" is auto-skipped)
  const out = {};
  text.split('\n').map(l=>l.trim()).filter(Boolean).forEach(line=>{
    const parts = parseCSVLine(line).map(s=>s.trim());
    if(parts.length<2) return;
    let [pos, name] = parts;
    if(/^(pos|position)$/i.test(pos) && /^name$/i.test(name)) return; // skip header
    if(!pos || !name) return;
    pos = pos.toUpperCase();
    if(!out[pos]) out[pos] = [];
    out[pos].push(name);
  });
  return out;
}

function loadRoster(){
  const text = document.getElementById('rosterInput').value;
  state.roster = detectRosterFormat(text)==='label' ? parseKeyList(text) : parseRosterCSV(text);
  render();
}
function loadOppRoster(){
  const text = document.getElementById('oppRosterInput').value;
  state.oppRoster = detectRosterFormat(text)==='label' ? parseKeyList(text) : parseRosterCSV(text);
  render();
}

// ---- Season Schedule: "Opponent @ Date" per line ----
function parseSchedule(text){
  return text.split('\n').map(l=>l.trim()).filter(Boolean).map(line=>{
    const parts = line.split('@').map(s=>s.trim());
    return { opponent: parts[0] || '', date: parts[1] || '' };
  }).filter(g=>g.opponent);
}
function loadSchedule(){
  state.schedule = parseSchedule(document.getElementById('scheduleInput').value);
  render();
}
function clearSchedule(){ state.schedule = []; document.getElementById('scheduleInput').value=''; render(); }
function saveScheduleToFile(){
  const payload = JSON.stringify({ schedule: state.schedule }, null, 2);
  const blob = new Blob([payload], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'season_schedule.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function loadScheduleFromFile(inputEl){
  const file = inputEl.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const saved = JSON.parse(e.target.result);
      if(Array.isArray(saved.schedule)){
        state.schedule = saved.schedule;
        document.getElementById('scheduleInput').value = state.schedule.map(g=>`${g.opponent} @ ${g.date}`).join('\n');
        render();
      } else { alert('That file does not look like a saved schedule.'); }
    } catch(err){ alert('Could not read that schedule file.'); }
  };
  reader.readAsText(file);
}

// ---- Start New Game: picks an opponent from the schedule, resets for a fresh game ----
function requestStartNewGame(index){ state.pendingNewGameIndex = index; state.confirmingNewGame = true; render(); }
function cancelStartNewGame(){ state.confirmingNewGame = false; render(); }
function confirmStartNewGame(){
  const game = state.schedule[state.pendingNewGameIndex];
  if(game){
    state.opponentName = game.opponent;
    state.gameDate = game.date;
  }
  state.oppRoster = {};
  state.plays = [];
  state.quarter = '1';
  state.nextSituation = { mode:'dd', down: state.manualDown, distance: state.manualDistance, forcedOdk: null };
  state.cur = {};
  state.lastExportAt = 0;
  state.lastActionNote = '';
  state.confirmingNewGame = false;
  render();
}
function clearOppRoster(){ state.oppRoster = {}; document.getElementById('oppRosterInput').value=''; render(); }

function toggleFavorite(name){
  state.favorites[name] = !state.favorites[name];
  render();
}

function sortedWithFavorites(list){
  if(!list) return list;
  const favs = list.filter(n=>state.favorites[n]);
  const rest = list.filter(n=>!state.favorites[n]);
  return [...favs, ...rest];
}
function loadPlaybook(){
  const text = document.getElementById('playbookInput').value;
  state.playbook = parseKeyList(text);
  render();
}
function loadDefPlaybook(){
  const text = document.getElementById('defPlaybookInput').value;
  state.defPlaybook = parseKeyList(text);
  render();
}
function clearRoster(){ state.roster = {}; document.getElementById('rosterInput').value=''; render(); }
function clearPlaybook(){ state.playbook = {}; document.getElementById('playbookInput').value=''; render(); }
function clearDefPlaybook(){ state.defPlaybook = {}; document.getElementById('defPlaybookInput').value=''; render(); }

function handleFileUpload(inputEl, targetTextareaId){
  const file = inputEl.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById(targetTextareaId).value = e.target.result;
    // Auto-load immediately -- previously this just filled the text box and silently
    // did nothing until "Load Roster"/"Load Playbook" was clicked separately.
    if(targetTextareaId === 'rosterInput') loadRoster();
    else if(targetTextareaId === 'oppRosterInput') loadOppRoster();
    else if(targetTextareaId === 'scheduleInput') loadSchedule();
    else if(targetTextareaId === 'playbookInput') loadPlaybook();
    else if(targetTextareaId === 'defPlaybookInput') loadDefPlaybook();
  };
  reader.readAsText(file);
}

// Given where the ball was snapped from and which way the last play went, gives a defensible
// guess at the next snap's hash. We only track L/M/R buckets (not exact yardage), so the only
// case we can be confident about is "ran back toward the hash it was already on." Anything else
// (up the middle, or all the way to the far side) we can't be sure crossed the whole field --
// Middle is the honest estimate rather than assuming a full hash swing.
function predictNextHash(prevHash, direction){
  if(prevHash === 'L' && direction === 'L') return 'L';
  if(prevHash === 'R' && direction === 'R') return 'R';
  if(prevHash && direction) return 'M';
  return prevHash || '';
}

// Copies the pre-snap-ish fields from the last real play forward, since a lot of series
// run the same look back-to-back. Deliberately leaves Play Type and Gain blank -- those
// describe THIS snap's outcome and should always be entered fresh. Hash is predicted rather
// than copied, since the ball's actual field position shifts based on the previous play's direction.
// Which categories actually get copied is controlled by the checkboxes above the button.
function repeatLast(){
  const lp = lastMeaningfulPlay();
  if(!lp) return;
  const f = state.repeatLastFields;
  state.cur.odk = lp.odk; // possession side always carries forward -- not optional
  if(f.formation){
    if(lp.formation) state.cur.formation = lp.formation;
    if(lp.play) state.cur.play = lp.play;
  }
  if(f.direction && lp.direction) state.cur.direction = lp.direction;
  if(f.strength){
    ['tostrength','toBoundary','toTE','toFB'].forEach(k=>{ if(lp[k]) state.cur[k] = lp[k]; });
  }
  if(f.hash && lp.hash) state.cur.hash = predictNextHash(lp.hash, lp.direction);
  render();
}
function toggleRepeatLastField(key){ state.repeatLastFields[key] = !state.repeatLastFields[key]; render(); }

function canLog(){
  if(!state.cur.odk || !state.cur.playType) return false;
  if(state.cur.odk === 'PAT') return !!state.cur.result;
  if(state.contentMode === 'stats') return state.cur.gain !== undefined; // Hash/Direction aren't shown in Stats-only mode
  return state.cur.hash && state.cur.direction && (state.cur.gain !== undefined);
}

function logPlay(){
  if(!canLog()) return;
  const ns = state.nextSituation;
  const isSpecialRow = state.cur.odk === 'PAT';
  // Standalone kicking plays (not already part of the TD->PAT->Kickoff chain) previously had no
  // way to know who receives afterward. "Kicking Team" fixes that: if "Us" kicks, the opponent (D)
  // receives; if "Opponent" kicks, we (O) receive.
  const explicitPendingReceiver = (['Kickoff','Onside','Punt'].includes(state.cur.playType) && (state.cur.kickingTeam === 'Us' || state.cur.kickingTeam === 'Opponent'))
    ? (state.cur.kickingTeam === 'Us' ? 'D' : 'O')
    : null;
  const row = {
    odk: state.cur.odk,
    formation: state.cur.formation || '',
    play: state.cur.play || '',
    down: ns.mode === 'dd' ? ns.down : null,
    distance: ns.mode === 'dd' ? ns.distance : null,
    gain: isSpecialRow ? (state.cur.gain !== undefined ? state.cur.gain : 0) : state.cur.gain,
    playType: state.cur.playType,
    hash: state.cur.hash || '',
    direction: state.cur.direction || '',
    tostrength: state.cur.tostrength || '',
    toBoundary: state.cur.toBoundary || '',
    toTE: state.cur.toTE || '',
    toFB: state.cur.toFB || '',
    motion: state.cur.motion || '',
    motionToStrength: state.cur.motionToStrength || '',
    motionToBoundary: state.cur.motionToBoundary || '',
    front: state.cur.front || '',
    coverage: state.cur.coverage || '',
    stunt: state.cur.stunt || '',
    stuntCall: state.cur.stuntCall === 'Other (type below)' ? (state.cur.stuntCallOther || '') : (state.cur.stuntCall || ''),
    foulBy: state.cur.foulBy || '',
    foulType: state.cur.foulType === 'Other (type below)' ? (state.cur.foulTypeOther || '') : (state.cur.foulType || ''),
    penaltyResult: state.cur.penaltyResult || '',
    spotOfFoul: state.cur.spotOfFoul || '',
    kickingTeam: state.cur.kickingTeam || '',
    clock: state.cur.clock || '',
    yardLine: state.cur.yardLine || '',
    result: state.cur.result || '',
    player: state.cur.player || '',
    passer: state.cur.passer || '',
    receiver: state.cur.receiver || '',
    tackler: state.cur.tackler || '',
    isTD: !!state.cur.isTD,
    isTurnover: !!state.cur.isTurnover,
    isSafety: !!state.cur.isSafety,
    notableEvent: state.cur.notableEvent || '',
    notes: state.cur.notableEvent === 'Other (type below)' ? (state.cur.notableEventOther || '') : (state.cur.notableEvent || ''),
    pendingReceiver: ns.pendingReceiver || explicitPendingReceiver || null, // auto-chain, else Kicking Team selection
    quarter: state.quarter,
    // The O/D side actually driving this play, even for K/PAT rows where odk itself doesn't say which side is kicking.
    // Prefer the freshest signal (what forced this row's ODK) over searching backward through history.
    drivingSide: (state.cur.odk==='O' || state.cur.odk==='D') ? state.cur.odk
      : (ns.forcedOdk==='O' || ns.forcedOdk==='D') ? ns.forcedOdk
      : mostRecentOffenseSide(state.plays.length),
  };
  state.plays.push(row);

  const next = computeNextSituation(row);
  state.nextSituation = next;

  let note = '';
  if(row.isSafety) note = '⚠️ Safety — switched to Free Kick.';
  else if(row.isTD) note = '🏈 TD logged — switched to PAT / 2PT attempt.';
  else if(row.odk === 'PAT') note = 'PAT/2PT logged — switched to Kickoff.';
  else if(row.odk === 'K' && row.pendingReceiver) note = `Kick logged — switched to ${row.pendingReceiver}, 1st & 10.`;
  else if(row.isTurnover) note = `Turnover — switched to ${next.forcedOdk}, 1st & 10.`;
  else if(next.turnoverOnDowns) note = `Turnover on downs — switched to ${next.forcedOdk}, 1st & 10.`;
  state.lastActionNote = note;

  state.cur = next.forcedOdk ? { odk: next.forcedOdk } : {};
  if(row.odk === 'PAT' && next.forcedOdk === 'K'){
    state.cur.playType = 'Kickoff'; // after a PAT the ensuing K play is always a kickoff, never onside/punt/FG
  }
  render();
}

function undoLast(){
  state.plays.pop();
  const newLast = lastMeaningfulPlay();
  state.nextSituation = computeNextSituation(newLast);
  state.cur = state.nextSituation.forcedOdk ? { odk: state.nextSituation.forcedOdk } : {};
  state.lastActionNote = '';
  render();
}

// A "No Play" row is for dead film/camera time — nothing happened, so it's logged as a placeholder
// without touching the down/distance/possession situation at all.
function logNoPlay(){
  const row = {
    odk: '', formation:'', play:'', down:null, distance:null, gain:undefined,
    playType:'No Play', hash:'', direction:'', tostrength:'', toBoundary:'', toTE:'', toFB:'',
    motion:'', motionToStrength:'', motionToBoundary:'', front:'', coverage:'', stunt:'', stuntCall:'',
    result:'', player:'', passer:'', receiver:'', tackler:'',
    isTD:false, isTurnover:false, isSafety:false,
    notableEvent:'', notes:'',
    pendingReceiver:null, quarter: state.quarter, drivingSide:null,
  };
  state.plays.push(row);
  state.lastActionNote = '🎥 No Play logged — situation unchanged.';
  render();
}

// ---- Manual End Drive (Yes/No confirm) ----
function requestEndDrive(){ state.confirmingEndDrive = true; render(); }
function cancelEndDrive(){ state.confirmingEndDrive = false; render(); }
function confirmEndDrive(){
  const currentSide = state.nextSituation.forcedOdk || state.cur.odk;
  const flipped = flipOdk((currentSide === 'O' || currentSide === 'D') ? currentSide : 'O');
  state.nextSituation = { mode:'dd', down:1, distance:10, forcedOdk: flipped };
  state.cur = { odk: flipped };
  state.confirmingEndDrive = false;
  state.lastActionNote = `Drive manually ended — switched to ${flipped}, 1st & 10.`;
  render();
}

// ---- End of Quarter ----
function getOpeningReceiver(){
  const first = state.plays.find(p => p.odk==='O' || p.odk==='D');
  return first ? first.odk : null;
}
function endQ1(){ state.quarter='2'; state.lastActionNote='End of Q1 — now Q2.'; render(); }
function endQ2(){
  const opener = getOpeningReceiver();
  if(opener === 'O' || opener === 'D'){
    const secondHalfReceiver = flipOdk(opener);
    state.nextSituation = { mode:'dd', down:1, distance:10, forcedOdk: secondHalfReceiver };
    state.cur = { odk: secondHalfReceiver };
    state.lastActionNote = `Halftime — ${secondHalfReceiver} receives to start the 2nd half, 1st & 10. Field direction flipped since teams switch ends.`;
  } else {
    state.lastActionNote = 'Halftime — no plays logged yet, so the 2nd-half receiver could not be determined automatically.';
  }
  state.fieldDirection = state.fieldDirection === 'right' ? 'left' : 'right'; // teams switch ends at halftime
  state.quarter='3';
  render();
}
function toggleFieldDirection(){ state.fieldDirection = state.fieldDirection === 'right' ? 'left' : 'right'; render(); }
function endQ3(){ state.quarter='4'; state.lastActionNote='End of Q3 — now Q4.'; render(); }
function endGame(){
  state.lastActionNote = 'Game ended — check Export for the final box score.';
  setTab('export');
}

function editStart(){ state.editingStart = !state.editingStart; render(); }
function bumpManual(field, delta){
  // Manual override always forces mode back to a normal down/distance situation.
  if(state.nextSituation.mode !== 'dd'){
    state.nextSituation = { mode:'dd', down: state.manualDown, distance: state.manualDistance, forcedOdk: state.nextSituation.forcedOdk };
  }
  if(field==='down'){
    state.nextSituation.down = Math.min(4, Math.max(1, state.nextSituation.down + delta));
    state.manualDown = state.nextSituation.down;
  } else {
    state.nextSituation.distance = Math.max(1, state.nextSituation.distance + delta);
    state.manualDistance = state.nextSituation.distance;
  }
  render();
}

// ---------------- RENDER: TAG TAB ----------------
function renderTagTab(){
  const ns = state.nextSituation;
  const isOffense = state.cur.odk === 'O';
  const isDefense = state.cur.odk === 'D';
  const isKicking = state.cur.odk === 'K';
  const isPAT = state.cur.odk === 'PAT';
  const playTypeOptions = isKicking ? KICK_PLAY_TYPES : (isPAT ? PAT_PLAY_TYPES : OFF_DEF_PLAY_TYPES);

  // Offense and Defense use completely separate formation vocabularies -- your run/pass formations
  // are meaningless on defensive snaps, and vice versa for fronts/coverages.
  const activePlaybook = isDefense ? state.defPlaybook : state.playbook;
  const defaultFormationList = isDefense ? DEFAULT_DEF_FORMATIONS : DEFAULT_FORMATIONS;
  const formationKeys = Object.keys(activePlaybook).length ? Object.keys(activePlaybook) : defaultFormationList;
  const plays = state.cur.formation && activePlaybook[state.cur.formation] ? activePlaybook[state.cur.formation] : null;

  // On Defense snaps, the ball carrier/passer/receiver is an OPPONENT player, not ours --
  // pull from the opponent roster there. Tackle Credit stays our own DEF roster always,
  // since we're the ones making the tackle regardless of who's on offense.
  const ballCarrierRoster = isDefense ? state.oppRoster : state.roster;
  const rbList = sortedWithFavorites([...(ballCarrierRoster['RB']||[]), ...(ballCarrierRoster['FB']||[])]);
  const qbList = sortedWithFavorites(ballCarrierRoster['QB']) || null;
  const wrList = sortedWithFavorites([...(ballCarrierRoster['WR']||[]), ...(ballCarrierRoster['TE']||[])]);
  const defList = sortedWithFavorites(state.roster['DEF']) || null;
  const kList = sortedWithFavorites(state.roster['K']) || null;
  const pList = sortedWithFavorites(state.roster['P'] || state.roster['K']) || null;

  let html = '';

  if(state.lastActionNote){
    html += `<div class="card" style="border-color:var(--amber); background:var(--amber-dim);">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
        <span style="font-size:13px; color:var(--amber); font-weight:700;">${escAttr(state.lastActionNote)}</span>
        <button class="undo-btn" style="width:auto; padding:8px 14px; margin:0; color:var(--amber); border-color:var(--amber);" onclick="undoLast()">Undo</button>
      </div>
    </div>`;
  }

  if(lastMeaningfulPlay()){
    const rl = state.repeatLastFields;
    html += `<div class="card" style="padding:10px 14px;">
      <div style="font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:8px;">Repeat Last — what to carry forward</div>
      <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:10px;">
        <label style="display:flex; align-items:center; gap:5px; font-size:13px;"><input type="checkbox" ${rl.formation?'checked':''} onchange="toggleRepeatLastField('formation')"> Formation</label>
        <label style="display:flex; align-items:center; gap:5px; font-size:13px;"><input type="checkbox" ${rl.hash?'checked':''} onchange="toggleRepeatLastField('hash')"> Hash</label>
        <label style="display:flex; align-items:center; gap:5px; font-size:13px;"><input type="checkbox" ${rl.direction?'checked':''} onchange="toggleRepeatLastField('direction')"> Direction</label>
        <label style="display:flex; align-items:center; gap:5px; font-size:13px;"><input type="checkbox" ${rl.strength?'checked':''} onchange="toggleRepeatLastField('strength')"> Strength</label>
      </div>
      <button class="undo-btn" style="width:100%; color:var(--text); margin:0;" onclick="repeatLast()">&#8635; Repeat Last</button>
    </div>`;
  }

  html += `<div class="card">
    <div class="section-label">Quick Actions</div>`;
  if(state.confirmingEndDrive){
    html += `<div class="hint" style="margin-top:0; color:var(--amber);">End this drive? This flips possession and resets to 1st &amp; 10.</div>
      <div class="row-btns">
        <button class="btn-primary" onclick="confirmEndDrive()">Yes, End Drive</button>
        <button class="btn-secondary" onclick="cancelEndDrive()">Cancel</button>
      </div>`;
  } else {
    html += `<button class="undo-btn" style="width:100%; margin-bottom:8px;" onclick="requestEndDrive()">End This Drive?</button>`;
  }
  html += `<button class="undo-btn" style="width:100%; margin-bottom:8px; color:var(--text);" onclick="setTab('export')">✎ Fix a Previous Play</button>`;
  html += `<div class="hint" style="margin-top:8px; margin-bottom:6px;">End of quarter — advances the clock and, for halftime, figures out who receives to start the 2nd half.</div>
    <div class="row-btns" style="flex-wrap:wrap;">
      <button class="btn-secondary" style="flex:1; min-width:70px;" onclick="endQ1()">End Q1</button>
      <button class="btn-secondary" style="flex:1; min-width:70px;" onclick="endQ2()">End Q2</button>
      <button class="btn-secondary" style="flex:1; min-width:70px;" onclick="endQ3()">End Q3</button>
      <button class="btn-primary" style="flex:1; min-width:70px;" onclick="endGame()">End Game</button>
    </div>
  </div>

  `;

  html += tileSection('ODK', ['O','D','K','PAT'], 'odk', 'small');

  if(state.cur.odk){
    if(state.showClock || state.showYardLine){
      const drive = computeDriveInfo();
      const isNewDrive = drive.playInDrive === 1;
      const isScoring = !!state.cur.isTD;
      const highlight = isNewDrive || isScoring;
      html += `<div class="card" ${highlight ? 'style="border-color:var(--amber);"' : ''}>
        <div class="section-label">${highlight ? (isScoring ? '⚠ Clock at Score' : '⚠ Clock/Ball at Start of Drive') : 'Clock / Ball Position'}</div>
        <div class="row-btns">
          ${state.showClock ? `<input type="text" value="${escAttr(state.cur.clock||'')}" placeholder="Clock (e.g. 8:42)" style="flex:1; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:14px;" onchange="state.cur.clock=this.value;">` : ''}
          ${state.showYardLine ? `<input type="text" value="${escAttr(state.cur.yardLine||'')}" placeholder="Yard Line (e.g. OWN 25)" style="flex:1; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:14px;" onchange="state.cur.yardLine=this.value;">` : ''}
        </div>
      </div>`;
    }
    if(!isPAT && state.contentMode !== 'stats'){
      html += tileSection('Formation', formationKeys, 'formation', 'small');
      if(plays && (isOffense || state.showDefPlay)){
        html += tileSection('Play (' + state.cur.formation + ')', [...plays,'?'], 'play', 'small');
      }
    }
    html += tileSection(isPAT ? 'Attempt Type' : 'Play Type', playTypeOptions, 'playType', '');

    if(isPAT){
      html += tileSection('Result', ['Good','No Good'], 'result', '');
    } else {
      const showStats = state.contentMode !== 'tag';
      const showTags = state.contentMode !== 'stats';
      const ballCarrierLabel = isDefense ? 'Ball Carrier (Opponent)' : 'Ball Carrier';
      const passerLabel = isDefense ? 'Passer (Opponent)' : 'Passer';
      const receiverLabel = isDefense ? 'Receiver (Opponent, leave blank if incomplete)' : 'Receiver (leave blank if incomplete)';
      if(showStats && (isOffense || isDefense) && state.cur.playType === 'Run' && rbList.length){
        html += tileSection(ballCarrierLabel, [...rbList,'Other'], 'player', 'small');
      }
      if(showStats && (isOffense || isDefense) && (state.cur.playType === 'Pass' || state.cur.playType === 'Sack')){
        if(qbList) html += tileSection(passerLabel, [...qbList,'Other'], 'passer', 'small');
        if(state.cur.playType === 'Pass' && wrList.length) html += tileSection(receiverLabel, [...wrList,'Other'], 'receiver', 'small');

      if(showStats && isDefense && defList && state.showTackleCredit){

        }
        if(showStats && (state.cur.playType==='Kickoff'||state.cur.playType==='FG') && kList) html += tileSection('Kicker', [...kList,'Other'], 'player', 'small');
        if(showStats && state.cur.playType==='Punt' && pList) html += tileSection('Punter', [...pList,'Other'], 'player', 'small');
        if(state.cur.playType==='FG') html += tileSection('Result', ['Good','No Good'], 'result', '');
      }

      if(state.cur.playType === 'Penalty'){
        html += tileSection('Foul By', ['Offense','Defense','?'], 'foulBy', 'small');
        html += tileSection('Foul Type', PENALTY_FOUL_TYPES, 'foulType', 'small');
        if(state.cur.foulType === 'Other (type below)'){
          html += `<input type="text" id="foulTypeOther" value="${escAttr(state.cur.foulTypeOther||'')}" placeholder="Describe the foul" style="width:100%; margin-bottom:12px; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:14px;" onchange="state.cur.foulTypeOther=this.value;">`;
        }
        html += tileSection('Result', PENALTY_RESULTS, 'penaltyResult', 'small');
        html += `<div class="card">
          <div class="section-label">Spot of Foul <span style="font-weight:400; color:var(--muted); text-transform:none;">(optional)</span></div>
          <input type="text" value="${escAttr(state.cur.spotOfFoul||'')}" placeholder="e.g. OWN 35" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:14px;" onchange="state.cur.spotOfFoul=this.value;">
        </div>`;
      }

      if(showTags){
        html += tileSection('Hash', ['L','M','R','?'], 'hash', '');
        html += tileSection('Direction', ['L','M','R','?'], 'direction', '');
        if(isOffense){
          if(state.showToStrength) html += tileSection('To Strength', ['YES','NO','NOT ON FIELD','?'], 'tostrength', 'small');
          if(state.showToBoundary) html += tileSection('To Boundary/Field', ['Boundary','Field','Middle','?'], 'toBoundary', 'small');
          if(state.showToTE) html += tileSection('To TE', ['YES','NO','NOT ON FIELD','?'], 'toTE', 'small');
          if(state.showToFB) html += tileSection('To FB', ['YES','NO','NOT ON FIELD','?'], 'toFB', 'small');
        }
        if(isDefense && state.showMotion){
          html += tileSection('Motion', ['YES','NO','?'], 'motion', 'small');
          if(state.showMotionToStrength) html += tileSection('Motion To Strength', ['YES','NO','?'], 'motionToStrength', 'small');
          if(state.showMotionToBoundary) html += tileSection('Motion To Boundary/Field', ['Boundary','Field','Middle','?'], 'motionToBoundary', 'small');
        }
        if(isDefense && state.showFront) html += tileSection('Front', ['30','40','50','?'], 'front', 'small');
        if(isDefense && state.showCoverage) html += tileSection('Coverage', ['Sky','Cloud','Lock','Trap','?'], 'coverage', 'small');
        if(isDefense && state.showStunt){
          html += tileSection('Stunt', ['YES','NO','?'], 'stunt', 'small');
          if(state.cur.stunt === 'YES'){
            const stuntList = state.cur.front === '30' ? STUNTS_30 : state.cur.front === '40' ? STUNTS_40 : STUNTS_FALLBACK;
            if(!state.cur.front || state.cur.front === '?'){
              html += `<div class="hint" style="margin-top:0;">Select a Front above to see its specific stunt calls — showing a generic list for now.</div>`;
            }
            html += tileSection('Stunt Call', stuntList, 'stuntCall', 'small');
            if(state.cur.stuntCall === 'Other (type below)'){
              html += `<input type="text" id="stuntCallOther" value="${escAttr(state.cur.stuntCallOther||'')}" placeholder="Describe the stunt/pressure" style="width:100%; margin-bottom:12px; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:14px;" onchange="state.cur.stuntCallOther=this.value;">`;
            }
          }
        }
      }

      const gainOptions = [];
      for(let i=-2;i<=15;i++) gainOptions.push(i);
      html += `<div class="card">
        <div class="section-label">Gain / Loss ${state.cur.gain!==undefined? '<span class="badge">'+state.cur.gain+'</span>':''}</div>
        <div class="grid">
          ${gainOptions.map(g=>`<button class="tile small ${state.cur.gain===g?'selected':''}" onclick="setGain(${g})">${g>0?'+':''}${g}</button>`).join('')}
        </div>
        <div style="margin-top:8px; display:flex; gap:8px; align-items:center;">
          <input type="number" id="customGain" placeholder="Custom yards" style="flex:1; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:15px;">
          <button class="tile small" style="width:80px;" onclick="const v=parseInt(document.getElementById('customGain').value); if(!isNaN(v)) setGain(v);">Set</button>
        </div>
      </div>`;

      html += `<div class="card">
        <div class="section-label">Scoring / Turnover</div>
        <div class="toggle-row">
          <button class="toggle ${state.cur.isTD?'on-td':''}" onclick="toggleTD()">${state.cur.isTD?'TD ✓':'Mark as TD'}</button>
          <button class="toggle ${state.cur.isTurnover?'on-to':''}" onclick="toggleTO()">${state.cur.isTurnover?'Turnover ✓ (+ on downs)':'Mark as Turnover (+ on downs)'}</button>
          <button class="toggle ${state.cur.isSafety?'on-to':''}" onclick="toggleSafety()">${state.cur.isSafety?'Safety ✓':'Mark as Safety'}</button>
        </div>
        <div class="toggle-row" style="margin-top:8px;">
          <button class="toggle ${state.cur.notableEvent==='Fumble Lost'?'on-to':''}" onclick="quickFumbleLost()">${state.cur.notableEvent==='Fumble Lost'?'Fumble — Lost ✓':'Fumble — Lost'}</button>
          <button class="toggle ${state.cur.notableEvent==='Fumble Recovered by Offense'?'on-td':''}" onclick="quickFumbleRecovered()">${state.cur.notableEvent==='Fumble Recovered by Offense'?'Fumble — Recovered ✓':'Fumble — Recovered'}</button>
        </div>
      </div>`;

      html += `<div class="card">
        <div class="section-label">Notable Event <span style="font-weight:400; color:var(--muted); text-transform:none;">(optional — for the weird stuff)</span></div>
        <div class="hint" style="margin-top:0;">If the DEFENSE recovers a fumble, use the Turnover toggle above instead — this list is for things that don't change possession, or aren't covered elsewhere.</div>
        <div class="grid" style="grid-template-columns: repeat(auto-fill, minmax(130px,1fr));">
          ${NOTABLE_EVENTS.map(ev=>`<button class="tile small ${state.cur.notableEvent===ev?'selected':''}" data-field="notableEvent" data-value="${escAttr(ev)}" onclick="handleTileClick(this)">${escAttr(ev)}</button>`).join('')}
        </div>
        ${state.cur.notableEvent==='Other (type below)' ? `
        <input type="text" id="notableEventOther" value="${escAttr(state.cur.notableEventOther||'')}" placeholder="Describe what happened" style="width:100%; margin-top:8px; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:14px;" onchange="state.cur.notableEventOther=this.value;">
        ` : ''}
      </div>`;
    }
  }

  const logLabel = ns.mode === 'dd' ? fmtDD(ns.down, ns.distance) : ns.label;
  html += `<button class="log-btn" ${canLog()? '' : 'disabled'} onclick="logPlay()">Log Play &rarr; ${logLabel}</button>`;
  if(state.plays.length) html += `<button class="undo-btn" onclick="undoLast()">Undo Last Play</button>`;

  html += `<div class="card"><div class="section-label">Recent Plays</div><div class="recent">`;
  if(!state.plays.length){
    html += `<div class="empty">No plays logged yet — first tap above.</div>`;
  } else {
    state.plays.slice(-5).reverse().forEach(p=>{
      if(p.playType === 'No Play'){
        html += `<div class="row"><span>🎥 No Play — camera/situation unchanged</span><span></span></div>`;
        return;
      }
      const who = p.player || p.passer || p.tackler || '';
      const ddLabel = (p.down!=null && p.distance!=null) ? fmtDD(p.down,p.distance) : p.odk;
      const gainLabel = (p.gain!==undefined && p.gain!==null) ? `${p.gain>=0?'+':''}${p.gain} yds` : '';
      html += `<div class="row"><span>${ddLabel} &middot; ${p.playType}${who? ' — '+who:''}${p.result? ' — '+p.result:''}${p.isTD?' 🏈TD':''}${p.isSafety?' 🛑SAFETY':''}${p.isTurnover?' ⚠TO':''}${p.notes?' &middot; <i>'+p.notes+'</i>':''}</span><span>${gainLabel}</span></div>`;
    });
  }
  html += `</div></div>`;
  return html;
}

function tileSection(label, options, field, sizeClass){
  const cls = sizeClass ? 'tile '+sizeClass : 'tile wide';
  const isStrengthField = ['tostrength','toTE','toFB','motion','motionToStrength'].includes(field);
  return `<div class="card">
    <div class="section-label">${label}</div>
    <div class="grid">
      ${options.map(o=>{
        let selCls = '';
        if(state.cur[field]===o){
          if(isStrengthField && o==='YES') selCls = 'selected green';
          else if(isStrengthField && o==='NO') selCls = 'selected red';
          else selCls = 'selected';
        }
        return `<button class="${cls} ${selCls}" data-field="${escAttr(field)}" data-value="${escAttr(o)}" onclick="handleTileClick(this)">${escAttr(o)}</button>`;
      }).join('')}
    </div>
  </div>`;
}

function handleTileClick(el){
  selectField(el.dataset.field, el.dataset.value);
}

// ---------------- RENDER: TENDENCIES TAB ----------------
function renderTendenciesTab(){
  const f = state.tendencyFilter;
  const rows = state.plays.filter(p => p.playType!=='No Play' && (f==='All' || p.odk===f));
  const total = rows.length;

  function pctBar(label, count, total, color){
    const pct = total ? (count/total*100) : 0;
    const isStrong = total >= 3 && (pct >= 70 || pct <= 30); // need a few plays before a % means anything
    return `<div class="stat-row" ${isStrong ? 'style="background:rgba(255,182,39,0.08); border-radius:8px; padding:8px 6px; margin:2px 0;"' : ''}>
      <span class="stat-name">${isStrong ? '⚠ ' : ''}${label}</span>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%; background:${isStrong ? 'var(--amber)' : (color||'var(--amber)')};"></div></div>
      <span class="stat-pct" style="${isStrong ? 'color:var(--amber); font-size:15px;' : ''}">${pct.toFixed(1)}%</span>
    </div>`;
  }

  let html = `<div class="card">
    <div class="section-label">
      Filter (ODK)
      <div class="filter-pill">
        ${['All','O','D','K'].map(v=>`<button class="${f===v?'active':''}" onclick="state.tendencyFilter='${v}'; render();">${v}</button>`).join('')}
      </div>
    </div>
    <div class="hint">${total} play${total!==1?'s':''} logged under this filter.</div>
  </div>`;

  if(!total){ html += `<div class="empty">Log a few plays to see live tendencies here.</div>`; return html; }

  // ---- Head Coach glance summary: score + the 2-3 loudest tendencies, nothing else ----
  {
    const scoring = computeScoring();
    const runCount = rows.filter(r=>r.playType==='Run').length;
    const passCount = rows.filter(r=>r.playType==='Pass').length;
    const runPassTotal = runCount + passCount;
    const runPct = runPassTotal ? (runCount/runPassTotal*100) : null;

    const dirCounts = {L:0,M:0,R:0};
    rows.forEach(r=>{ if(dirCounts[r.direction]!==undefined) dirCounts[r.direction]++; });
    const dirTotal = dirCounts.L+dirCounts.M+dirCounts.R;
    let topDir = null, topDirPct = 0;
    if(dirTotal){
      Object.entries(dirCounts).forEach(([d,c])=>{ const p=c/dirTotal*100; if(p>topDirPct){ topDirPct=p; topDir=d; } });
    }

    const headlines = [];
    if(runPct !== null) headlines.push(`${runPct>=50?'RUN':'PASS'} ${Math.round(runPct>=50?runPct:100-runPct)}%`);
    if(topDir) headlines.push(`${({L:'LEFT',M:'MIDDLE',R:'RIGHT'})[topDir]} ${Math.round(topDirPct)}%`);

    html += `<div class="card" style="border-color:var(--amber); background:var(--amber-dim);">
      <div class="section-label" style="color:var(--amber);">Head Coach Glance</div>
      <div style="font-family:'SFMono-Regular',Menlo,monospace; font-size:28px; font-weight:800; margin:4px 0;">
        <span style="color:${state.ourColor};">${escAttr(state.teamName)} ${scoring.yourScore}</span>
        <span style="color:var(--muted);"> — </span>
        <span style="color:${state.oppColor};">${scoring.oppScore} ${escAttr(state.opponentName)}</span>
      </div>
      <div style="font-size:14px; color:var(--muted); margin-bottom:8px;">${total} plays under this filter</div>
      ${headlines.length ? `<div style="font-size:20px; font-weight:800; color:var(--amber);">${headlines.join('  ·  ')}</div>` : ''}
    </div>`;
  }

  const types = ['Run','Pass','Sack','Penalty'];
  html += `<div class="card"><div class="section-label">Play Mix</div>`;
  types.forEach(t=>{ const c = rows.filter(r=>r.playType===t).length; if(c) html += pctBar(t, c, total); });
  html += `</div>`;

  function strengthCard(title, field){
    const fRows = rows.filter(r=>r[field]==='YES'||r[field]==='NO');
    if(!fRows.length) return '';
    const yes = fRows.filter(r=>r[field]==='YES').length;
    return `<div class="card"><div class="section-label">${title}</div>
      ${pctBar('Yes', yes, fRows.length, 'var(--green)')}
      ${pctBar('No', fRows.length-yes, fRows.length, 'var(--red)')}
    </div>`;
  }
  html += strengthCard('Run to Strength', 'tostrength');
  html += strengthCard('Run to TE', 'toTE');
  html += strengthCard('Run to FB', 'toFB');

  const boundaryRows = rows.filter(r=>['Boundary','Field','Middle'].includes(r.toBoundary));
  if(boundaryRows.length){
    html += `<div class="card"><div class="section-label">To Boundary / Field / Middle</div>`;
    ['Boundary','Field','Middle'].forEach(v=>{
      const c = boundaryRows.filter(r=>r.toBoundary===v).length;
      html += pctBar(v, c, boundaryRows.length);
    });
    html += `</div>`;
  }

  html += `<div class="card"><div class="section-label">Play Direction</div>`;
  ['L','M','R'].forEach(d=>{
    const c = rows.filter(r=>r.direction===d).length;
    const dirTotal = rows.filter(r=>r.direction).length;
    if(dirTotal) html += pctBar({L:'Left',M:'Middle',R:'Right'}[d], c, dirTotal);
  });
  html += `</div>`;

  const formationsUsed = [...new Set(rows.map(r=>r.formation).filter(Boolean))];
  if(formationsUsed.length){
    html += `<div class="card"><div class="section-label">Formation Frequency</div>`;
    const formTotal = rows.filter(r=>r.formation).length;
    formationsUsed.forEach(fo=>{ const c = rows.filter(r=>r.formation===fo).length; html += pctBar(fo, c, formTotal); });
    html += `</div>`;
  }

  // Play Call Efficiency — which specific calls are actually gaining yards, not just how often they're run.
  const playCallRows = rows.filter(r => r.play && ['Run','Pass'].includes(r.playType) && r.gain != null);
  if(playCallRows.length){
    const byPlay = {};
    playCallRows.forEach(r=>{
      const key = r.play;
      if(!byPlay[key]) byPlay[key] = { count:0, totalGain:0, formation:r.formation };
      byPlay[key].count++;
      byPlay[key].totalGain += r.gain;
    });
    const sorted = Object.entries(byPlay).sort((a,b)=>b[1].count-a[1].count);
    html += `<div class="card"><div class="section-label">Play Call Efficiency</div>
      <div class="hint" style="margin-top:0;">Avg yards per play call — which specific calls are actually working, not just which get called most.</div>
      <div class="scroll-x"><table>
        <tr><th>Play</th><th>Formation</th><th>Calls</th><th>Avg Gain</th></tr>
        ${sorted.map(([play,d])=>{
          const avg = d.totalGain/d.count;
          return `<tr><td>${play}</td><td>${d.formation||''}</td><td>${d.count}</td><td style="color:${avg>=5?'var(--green)':avg<0?'var(--red)':'var(--text)'}; font-weight:700;">${avg.toFixed(1)}</td></tr>`;
        }).join('')}
      </table></div>
    </div>`;
  }

  html += `<div class="card"><div class="section-label">Tendencies by Down</div>`;
  [1,2,3,4].forEach(d=>{
    const dRows = rows.filter(r=>r.down===d);
    if(!dRows.length) return;
    const runC = dRows.filter(r=>r.playType==='Run').length;
    html += pctBar(`Down ${d} — Run %  (${dRows.length} plays)`, runC, dRows.length);
  });
  html += `</div>`;

  const firstTen = rows.filter(r=>r.down===1 && r.distance===10);
  if(firstTen.length){
    const runC = firstTen.filter(r=>r.playType==='Run').length;
    html += `<div class="card"><div class="section-label">1st &amp; 10 Specific (${firstTen.length} plays)</div>
      ${pctBar('Run %', runC, firstTen.length)}
      ${pctBar('Pass %', firstTen.length-runC, firstTen.length)}
    </div>`;
  }
  return html;
}

// ---------------- RENDER: BOX SCORE TAB ----------------
function computeBoxScoreData(){
  const offRows = state.plays.filter(p=>p.odk==='O');
  function tally(rows, keyField){
    const map = {};
    rows.forEach(r=>{
      const k = r[keyField];
      if(!k) return;
      if(!map[k]) map[k] = {plays:0, yards:0, tds:0};
      map[k].plays++;
      map[k].yards += (r.gain||0);
      if(r.isTD) map[k].tds++;
    });
    return map;
  }
  const totalPlays = offRows.filter(r=>['Run','Pass','Sack'].includes(r.playType));
  const totalYards = totalPlays.reduce((s,r)=>s+(r.gain||0),0);
  const totalTDs = state.plays.filter(r=>r.isTD).length;
  const totalTOs = state.plays.filter(r=>r.isTurnover).length;
  const avgPerPlay = totalPlays.length ? (totalYards/totalPlays.length) : 0;
  const rush = tally(offRows.filter(r=>r.playType==='Run'), 'player');
  const passRows = offRows.filter(r=>r.playType==='Pass');
  const pass = tally(passRows, 'passer');
  const passCompletions = {};
  Object.keys(pass).forEach(name=>{ passCompletions[name] = passRows.filter(r=>r.passer===name && r.receiver).length; });
  const rec = tally(passRows.filter(r=>r.receiver), 'receiver');
  const defRows = state.plays.filter(r=>r.odk==='D' && r.tackler);
  const tack = {};
  defRows.forEach(r=>{ tack[r.tackler] = (tack[r.tackler]||0)+1; });
  const penaltyCount = state.plays.filter(r=>r.playType==='Penalty').length;
  return { totalYards, avgPerPlay, totalTDs, totalTOs, rush, pass, passCompletions, rec, tack, penaltyCount };
}

function renderBoxScoreTab(){
  if(!state.plays.length){ return `<div class="empty">No plays logged yet.</div>`; }
  const d = computeBoxScoreData();
  let html = '';

  html += `<div class="card">
    <div class="section-label">Team Totals (Offense)</div>
    <div class="stat-row"><span class="stat-name">Total Yards</span><span class="stat-pct">${d.totalYards}</span></div>
    <div class="stat-row"><span class="stat-name">Avg / Play</span><span class="stat-pct">${d.avgPerPlay.toFixed(1)}</span></div>
    <div class="stat-row"><span class="stat-name">Touchdowns</span><span class="stat-pct">${d.totalTDs}</span></div>
    <div class="stat-row"><span class="stat-name">Turnovers</span><span class="stat-pct">${d.totalTOs}</span></div>
  </div>`;

  if(Object.keys(d.rush).length){
    html += `<div class="card"><div class="section-label">Rushing</div>
      <table><tr><th>Player</th><th>Car</th><th>Yds</th><th>Avg</th><th>TD</th></tr>
      ${Object.entries(d.rush).sort((a,b)=>b[1].yards-a[1].yards).map(([name,s])=>
        `<tr><td>${name}</td><td>${s.plays}</td><td>${s.yards}</td><td>${(s.yards/s.plays).toFixed(1)}</td><td>${s.tds}</td></tr>`
      ).join('')}</table>
    </div>`;
  }

  if(Object.keys(d.pass).length){
    html += `<div class="card"><div class="section-label">Passing</div>
      <table><tr><th>Player</th><th>Att</th><th>Comp</th><th>Yds</th><th>TD</th></tr>
      ${Object.entries(d.pass).map(([name,s])=>
        `<tr><td>${name}</td><td>${s.plays}</td><td>${d.passCompletions[name]}</td><td>${s.yards}</td><td>${s.tds}</td></tr>`
      ).join('')}</table>
    </div>`;
  }

  if(Object.keys(d.rec).length){
    html += `<div class="card"><div class="section-label">Receiving</div>
      <table><tr><th>Player</th><th>Rec</th><th>Yds</th><th>TD</th></tr>
      ${Object.entries(d.rec).sort((a,b)=>b[1].yards-a[1].yards).map(([name,s])=>
        `<tr><td>${name}</td><td>${s.plays}</td><td>${s.yards}</td><td>${s.tds}</td></tr>`
      ).join('')}</table>
    </div>`;
  }

  if(Object.keys(d.tack).length){
    html += `<div class="card"><div class="section-label">Tackles</div>
      <table><tr><th>Player</th><th>Tackles</th></tr>
      ${Object.entries(d.tack).sort((a,b)=>b[1]-a[1]).map(([name,c])=>`<tr><td>${name}</td><td>${c}</td></tr>`).join('')}</table>
    </div>`;
  }

  if(!Object.keys(d.rush).length && !Object.keys(d.pass).length && !Object.keys(d.tack).length){
    html += `<div class="empty">No player-attributed plays yet — assign a Ball Carrier / Passer / Tackler while tagging to populate the box score.</div>`;
  }

  return html;
}
