    <div class="hint" style="margin-top:0;">Every field on the Tag tab (Hash, Direction, and every toggleable field below) includes a <b>"?"</b> choice. Use it whenever whoever's tagging didn't see or hear something clearly — it protects the data by making "I don't know" explicit instead of forcing a guess or leaving a gap. A play logged with a "?" somewhere is still far more useful than one silently left blank or wrong.</div>
  </div>
  <div class="card">
    <div class="section-label">Offense Toggles (Tag tab)</div>
    <div class="hint" style="margin-top:0;">Turn each of these on or off independently — skip whatever your staff isn't tracking this week. These only appear on Offense (O) snaps.</div>
    ${toggleRow('To Strength', state.showToStrength, "setShowToStrength(true)", "setShowToStrength(false)")}
    ${toggleRow('To Boundary/Field', state.showToBoundary, "setShowToBoundary(true)", "setShowToBoundary(false)")}
    ${toggleRow('To TE', state.showToTE, "setShowToTE(true)", "setShowToTE(false)")}
    ${toggleRow('To FB', state.showToFB, "setShowToFB(true)", "setShowToFB(false)")}
  </div>

  <div class="card">
    <div class="section-label">Defense Toggles (Tag tab)</div>
    <div class="hint" style="margin-top:0;">These only appear on Defense (D) snaps.</div>
    ${toggleRow('Tackle Credit', state.showTackleCredit, "setShowTackleCredit(true)", "setShowTackleCredit(false)")}
    ${toggleRow('Motion', state.showMotion, "setShowMotion(true)", "setShowMotion(false)")}
    ${state.showMotion ? `
    <div style="margin-left:16px; padding-left:12px; border-left:2px solid var(--line);">
      ${toggleRow('Motion To Strength (Y/N)', state.showMotionToStrength, "setShowMotionToStrength(true)", "setShowMotionToStrength(false)")}
      ${toggleRow('Motion To Boundary/Field', state.showMotionToBoundary, "setShowMotionToBoundary(true)", "setShowMotionToBoundary(false)")}
    </div>
    ` : ''}
    ${toggleRow('Front (30/40/50)', state.showFront, "setShowFront(true)", "setShowFront(false)")}
    ${toggleRow('Coverage (Sky/Cloud/Lock/Trap)', state.showCoverage, "setShowCoverage(true)", "setShowCoverage(false)")}
    ${toggleRow('Stunt (Y/N)', state.showStunt, "setShowStunt(true)", "setShowStunt(false)")}
    ${toggleRow('Play Call (per Formation)', state.showDefPlay, "setShowDefPlay(true)", "setShowDefPlay(false)")}
    <div class="hint" style="margin-top:0;">When a play is tagged Stunt = YES, a second set of tiles appears to pick the specific stunt/pressure call.</div>
  </div>

  <div class="card">
    <div class="section-label">General Toggles</div>
    <div class="hint" style="margin-top:0;">These apply to every play type (O, D, K, PAT) — off by default since they're extra work on top of tagging. Turn them on only if it's realistic to keep up with during the game; both are free-text so any format works.</div>
    ${toggleRow('Clock (time remaining)', state.showClock, "setShowClock(true)", "setShowClock(false)")}
    ${toggleRow('Yard Line (ball position)', state.showYardLine, "setShowYardLine(true)", "setShowYardLine(false)")}
    <div class="hint" style="margin-top:0;">When either is on, the field is highlighted automatically at the start of a new drive and on any play marked TD — those are the moments it matters most for time-of-possession and scoring context.</div>
  </div>

  <div class="card">
    <div class="section-label">Game Info (used on the final report)</div>
    <div class="hint">Your team name, the opponent, and the date — these show up on the header of the emailed box score.</div>
    <div class="row-btns" style="margin-bottom:8px;">
      <input type="text" id="teamNameInput" value="${escAttr(state.teamName)}" placeholder="Your team name" style="flex:1; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:14px;">
      <input type="text" id="opponentNameInput" value="${escAttr(state.opponentName)}" placeholder="Opponent name" style="flex:1; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:14px;">
    </div>
    <input type="text" id="gameDateInput" value="${escAttr(state.gameDate)}" placeholder="Game date (e.g. 8/28/25)" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:14px; margin-bottom:8px;">
    <div style="display:flex; gap:16px; align-items:center; margin-bottom:8px;">
      <label style="display:flex; align-items:center; gap:8px; font-size:13px;">Our Color <input type="color" id="ourColorInput" value="${state.ourColor}" style="width:44px; height:32px; border:none; border-radius:6px; padding:0;"></label>
      <label style="display:flex; align-items:center; gap:8px; font-size:13px;">Opponent Color <input type="color" id="oppColorInput" value="${state.oppColor}" style="width:44px; height:32px; border:none; border-radius:6px; padding:0;"></label>
    </div>
    <div class="hint" style="margin-top:0;">Our color defaults to Logan's lipstick red. Opponent color is just for the week — set it however (ask, guess, or look up the school), it doesn't affect anything besides the score display below.</div>
    <button class="btn-primary" style="width:100%;" onclick="saveGameInfo()">Save Game Info</button>
  </div>

  <div class="card">
    <div class="section-label">Season Schedule</div>
    <div class="hint">One game per line: <code>Opponent @ Date</code>, e.g. <code>Onalaska Hilltoppers @ 8/28/26</code>. Load it once, then use "Start New Game" below to pick a week with one tap instead of retyping the opponent every time.</div>
    <input type="file" accept=".txt,.csv" onchange="handleFileUpload(this,'scheduleInput')" style="margin-bottom:8px; color:var(--muted); font-size:12px;">
    <textarea id="scheduleInput" placeholder="Onalaska Hilltoppers @ 8/28/26&#10;West Salem @ 9/4/26">${state.schedule.map(g=>`${g.opponent} @ ${g.date}`).join('\n')}</textarea>
    <div class="row-btns" style="margin-top:8px;">
      <button class="btn-primary" onclick="loadSchedule()">Load Schedule</button>
      <button class="btn-secondary" onclick="clearSchedule()">Clear</button>
    </div>
    <div class="hint" style="margin-top:8px;">This doesn't save itself between sessions — save it to a file once, then reload that file at the start of each new session instead of retyping the whole season.</div>
    <div class="row-btns">
      <button class="btn-secondary" onclick="saveScheduleToFile()">Save Schedule to File</button>
      <label class="btn-secondary" style="text-align:center; cursor:pointer;">Load Schedule File
        <input type="file" accept=".json" onchange="loadScheduleFromFile(this)" style="display:none;">
      </label>
    </div>
  </div>

  <div class="card" ${state.confirmingNewGame ? 'style="border-color:var(--amber);"' : ''}>
    <div class="section-label">Start New Game</div>
    ${state.confirmingNewGame ? `
    <div class="hint" style="margin-top:0; color:var(--amber);">Start "${escAttr((state.schedule[state.pendingNewGameIndex]||{}).opponent||'')}"? This clears the Opponent Roster and every play logged so far — export a CSV first if you haven't already and need this game's data.</div>
    <div class="row-btns">
      <button class="btn-primary" onclick="confirmStartNewGame()">Yes, Start New Game</button>
      <button class="btn-secondary" onclick="cancelStartNewGame()">Cancel</button>
    </div>
    ` : (state.schedule.length ? `
    <div class="hint" style="margin-top:0;">Tap this week's opponent to set it as the game, clear last week's opponent roster, and start a clean play log.</div>
    <div class="grid">
      ${state.schedule.map((g,i)=>`<button class="tile small" onclick="requestStartNewGame(${i})">${escAttr(g.opponent)}${g.date?' ('+escAttr(g.date)+')':''}</button>`).join('')}
    </div>
    ` : `<div class="hint" style="margin-top:0;">Load your season schedule above to pick a game with one tap — or just fill in Game Info manually above, that still works fine without a schedule.</div>`)}
  </div>

  <div class="card">
    <div class="section-label">Mode</div>
    <div class="hint">Mode: <b>Live</b> is for tagging during the game (urgent framing, export reminders). <b>Scout</b> is for reviewing film after the fact — no clock pressure, calmer framing. All features work the same in both; this just changes tone/emphasis.</div>
    <div class="filter-pill" style="width:fit-content; margin-bottom:16px;">
      <button class="${state.appMode==='live'?'active':''}" onclick="setAppMode('live')">Live</button>
      <button class="${state.appMode==='scout'?'active':''}" onclick="setAppMode('scout')">Scout</button>
    </div>
    <div class="hint" style="margin-top:0;"><b>Tag</b>: tendency fields only, no player attribution. <b>Stats</b>: player attribution (ball carrier, passer, etc.) and scoring only, no tendency fields, hash/direction not required. <b>Tag + Stats</b>: everything, as before.</div>
    <div class="filter-pill" style="width:fit-content;">
      <button class="${state.contentMode==='tag'?'active':''}" onclick="setContentMode('tag')">Tag</button>
      <button class="${state.contentMode==='stats'?'active':''}" onclick="setContentMode('stats')">Stats</button>
      <button class="${state.contentMode==='tagstats'?'active':''}" onclick="setContentMode('tagstats')">Tag + Stats</button>
    </div>
  </div>
  <div class="card">
    <div class="section-label">Our Roster (drives player pickers on Offense)</div>
    <div class="hint">
      Two accepted formats — pick whichever matches what you have:<br>
      1) <code>RB: Name, Name</code> — one position per line.<br>
      2) A plain CSV with rows of <code>Position,Name</code> (a header row is fine, it's auto-skipped).<br>
      Recognized keys: <b>QB, RB, FB, WR, TE, DEF, K, P</b>. "FB" plays into the same Ball Carrier picker as RB. "DEF" should list anyone eligible for tackle credit (LBs, DL, DBs combined).<br>
      Want jersey numbers on the buttons? Just include them in the name itself, e.g. <code>RB: 21 Doe, 4 Lee</code> — it'll show and export exactly as typed, no separate field needed.<br><br>
      Have a PDF roster? <a href="${duckUrlPDF}" target="_blank" rel="noopener" style="color:var(--amber); font-weight:700;">Click here!</a>
      &nbsp;&nbsp;·&nbsp;&nbsp;
      Have a text roster (not yet in Position,Name format)? <a href="${duckUrlText}" target="_blank" rel="noopener" style="color:var(--amber); font-weight:700;">Click here!</a>
      <br>Both open Duck.ai (no sign-up or login needed) with a starter prompt already typed in — just drop your file or paste your roster into the same message. If the prompt box comes up empty, paste this in yourself: <br><code>${escAttr(duckPromptPDF)}</code> (PDF) or <code>${escAttr(duckPromptText)}</code> (text)
    </div>
    <input type="file" accept=".txt,.csv" onchange="handleFileUpload(this,'rosterInput')" style="margin-bottom:8px; color:var(--muted); font-size:12px;">
    <textarea id="rosterInput" placeholder="QB: Smith&#10;RB: Doe, Lee&#10;WR: Jones, Park&#10;DEF: Cole, Ray, Kim&#10;&#10;— or —&#10;Position,Name&#10;RB,Doe&#10;RB,Lee">${Object.keys(state.roster).map(k=>`${k}: ${state.roster[k].join(', ')}`).join('\n')}</textarea>
    <div class="row-btns" style="margin-top:8px;">
      <button class="btn-primary" onclick="loadRoster()">Load Roster</button>
      <button class="btn-secondary" onclick="clearRoster()">Clear</button>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Opponent Roster (drives player pickers on Defense)</div>
    <div class="hint">
      Their players — reset this each week. When you tag a Defense (D) snap, Ball Carrier/Passer/Receiver pull from here instead of your own roster, since that's whoever actually touched the ball against you.<br>
      Same two formats as Our Roster above. Recognized keys: <b>QB, RB, FB, WR, TE</b> (no DEF needed — their defensive players aren't tracked here).
    </div>
    <input type="file" accept=".txt,.csv" onchange="handleFileUpload(this,'oppRosterInput')" style="margin-bottom:8px; color:var(--muted); font-size:12px;">
    <textarea id="oppRosterInput" placeholder="QB: 8 Smith&#10;RB: 21 Doe, 4 Lee&#10;WR: 12 Jones">${Object.keys(state.oppRoster).map(k=>`${k}: ${state.oppRoster[k].join(', ')}`).join('\n')}</textarea>
    <div class="row-btns" style="margin-top:8px;">
      <button class="btn-primary" onclick="loadOppRoster()">Load Opponent Roster</button>
      <button class="btn-secondary" onclick="clearOppRoster()">Clear</button>
    </div>
  </div>`;

  if(allNames.length){
    html += `<div class="card">      <div class="section-label">Favorites (shown first in dropdowns)</div>
      <div class="hint">Tap a name to mark it a favorite — likely-to-touch-the-ball players (your varsity-relevant kids, not the whole JV roster) will then sort to the top of every picker instead of getting buried in a long list.</div>
      <div>${allNames.map(n=>`<button class="fav-chip ${state.favorites[n]?'fav':''}" data-name="${escAttr(n)}" onclick="toggleFavorite(this.dataset.name)">${state.favorites[n]?'⭐ ':''}${escAttr(n)}</button>`).join('')}</div>
    </div>`;
  }

  html += `<div class="card">
    <div class="section-label">Offensive Playbook (formations &amp; plays)</div>
    <div class="hint">One formation per line: <code>Formation Name: Play A, Play B, Play C</code>. Used only on Offense (O) snaps.</div>
    <input type="file" accept=".txt,.csv" onchange="handleFileUpload(this,'playbookInput')" style="margin-bottom:8px; color:var(--muted); font-size:12px;">
    <textarea id="playbookInput" placeholder="Trips Right: 92 Bang, Zoom Post, Draw&#10;Ace: Iso, PA Boot, Slant Flat">${Object.keys(state.playbook).map(k=>`${k}: ${state.playbook[k].join(', ')}`).join('\n')}</textarea>
    <div class="row-btns" style="margin-top:8px;">
      <button class="btn-primary" onclick="loadPlaybook()">Load Playbook</button>
      <button class="btn-secondary" onclick="clearPlaybook()">Clear</button>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Defensive Playbook (fronts &amp; coverages)</div>
    <div class="hint">Separate from offense on purpose — your fronts/coverages don't share a vocabulary with your run/pass formations. One front per line: <code>Front Name: Call A, Call B</code>. Used only on Defense (D) snaps. Default if left empty: King, Queen, Trips, Pro.</div>
    <input type="file" accept=".txt,.csv" onchange="handleFileUpload(this,'defPlaybookInput')" style="margin-bottom:8px; color:var(--muted); font-size:12px;">
    <textarea id="defPlaybookInput" placeholder="King: Cover 3, Cover 1&#10;Queen: Cover 2, Blitz">${Object.keys(state.defPlaybook).map(k=>`${k}: ${state.defPlaybook[k].join(', ')}`).join('\n')}</textarea>
    <div class="row-btns" style="margin-top:8px;">
      <button class="btn-primary" onclick="loadDefPlaybook()">Load Defensive Playbook</button>
      <button class="btn-secondary" onclick="clearDefPlaybook()">Clear</button>
    </div>
  </div>`;
  return html;
}

// ---------------- RENDER: EXPORT TAB ----------------
function renderExportTab(){
  const sinceExport = state.plays.length - state.lastExportAt;
  let html = '';
  const canWebShare = (typeof navigator !== 'undefined' && navigator.canShare);

  html += `<div class="card">
    <div class="section-label">Crash Recovery</div>
    <div class="hint">Nothing here saves itself automatically — if the tab closes or the phone dies, whatever hasn't been exported is gone. Export a checkpoint every quarter or so. If you do lose the session, re-load this page and import your last downloaded CSV below to pick up exactly where you left off.</div>
    <input type="file" accept=".csv" onchange="importCSV(this)" style="color:var(--muted); font-size:12px;">
  </div>`;

  html += `<div class="card">
    <div class="section-label">Import from Hudl Assist</div>
    <div class="hint">Upload a breakdown CSV from Hudl. Hudl's own column names vary by team/setup, so map each of your columns below (auto-guessed where possible) — you'll get a chance to fix anything after import in Review &amp; Edit. This adds to whatever's already logged, it doesn't replace it. Excel (.xlsx) files: re-save as CSV first — this only reads CSV.</div>
    <input type="file" accept=".csv" onchange="handleHudlFileUpload(this)" style="color:var(--muted); font-size:12px;">
  </div>`;

  if(state.hudlImport){
    const hi = state.hudlImport;
    const skipOpt = h => `<option value="" ${!h?'selected':''}>— skip —</option>`;
    const colOpts = (selected) => skipOpt(selected) + hi.headers.map(h=>`<option value="${escAttr(h)}" ${selected===h?'selected':''}>${escAttr(h)}</option>`).join('');
    html += `<div class="card">
      <div class="section-label">Map Hudl Columns (${hi.rows.length} rows found)</div>
      ${state.lastHudlMapping ? `<div class="hint" style="color:var(--green);">Reused your last mapping from this session where the column names matched — double-check it below.</div>` : ''}
      <div class="hint">Which column in your file is which side (O/D)? Pick the column, then type the exact value that means "this is our offense" and the value that means "this is the opponent."</div>
      <div class="row-btns" style="margin-bottom:8px; flex-wrap:wrap;">
        <select style="flex:1; min-width:140px; padding:10px; border-radius:8px; background:var(--panel); color:var(--text); border:1px solid var(--line);" onchange="setHudlTeamCol(this.value)">
          ${colOpts(hi.teamCol)}
        </select>
      </div>
      ${hi.teamCol ? `<div class="hint">Values seen in "${escAttr(hi.teamCol)}": ${distinctHudlTeamValues().map(v=>escAttr(v)).join(', ') || '(none found)'}</div>
      <div class="row-btns" style="margin-bottom:12px;">
        <input type="text" placeholder="Value meaning OUR team (O)" value="${escAttr(hi.teamOValue)}" onchange="setHudlTeamValue('teamOValue', this.value)" style="flex:1; padding:10px; border-radius:8px; background:var(--panel); color:var(--text); border:1px solid var(--line);">
        <input type="text" placeholder="Value meaning OPPONENT (D)" value="${escAttr(hi.teamDValue)}" onchange="setHudlTeamValue('teamDValue', this.value)" style="flex:1; padding:10px; border-radius:8px; background:var(--panel); color:var(--text); border:1px solid var(--line);">
      </div>` : ''}
      ${HUDL_MAP_FIELDS.map(f=>`
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
          <span style="width:120px; font-size:13px; color:var(--muted);">${f.label}</span>
          <select style="flex:1; padding:8px; border-radius:8px; background:var(--panel); color:var(--text); border:1px solid var(--line);" onchange="setHudlMapping('${f.key}', this.value)">
            ${colOpts(hi.mapping[f.key])}
          </select>
        </div>
      `).join('')}
      <div class="row-btns" style="margin-top:8px;">
        <button class="btn-primary" onclick="commitHudlImport()">Import ${hi.rows.length} Plays</button>
        <button class="btn-secondary" onclick="cancelHudlImport()">Cancel</button>
      </div>
      <div class="hint" style="margin-top:12px;">Mapping saved automatically for the rest of this session. To reuse it on a different day/device, save it to a file:</div>
      <div class="row-btns">
        <button class="btn-secondary" onclick="saveHudlMappingFile()">Save Mapping to File</button>
        <label class="btn-secondary" style="text-align:center; cursor:pointer;">Load Mapping File
          <input type="file" accept=".json" onchange="loadHudlMappingFile(this)" style="display:none;">
        </label>
      </div>
    </div>`;
  }

  if(!state.plays.length && !state.hudlImport) return html + `<div class="empty">No plays logged yet — nothing to export.</div>`;
  if(!state.plays.length) return html; // Hudl mapping UI is showing above; nothing else to render yet

  const scoring = computeScoring();
  html += `<div class="card">
    <div class="section-label">Final Box Score (after the game)</div>
    <div class="hint">
      Current score: <b>${escAttr(state.teamName)} ${scoring.yourScore} — ${scoring.oppScore} ${escAttr(state.opponentName)}</b>.
      This builds a full text report (score by quarter, scoring summary, team totals, leaders, full play-by-play) from everything logged so far.
      A live-updating Google Doc isn't something this tool can create directly — that needs a Google sign-in and API access this app doesn't have — but the report below is formatted to paste cleanly into a blank Doc or email in one shot.
    </div>
    <button class="log-btn" onclick="emailBoxScore()">Share Final Box Score (Notes, Mail...)</button>
    <div class="row-btns" style="margin-top:8px;">
      <button class="btn-secondary" onclick="copyBoxScore()">Copy Text</button>
      <button class="btn-secondary" onclick="downloadBoxScore()">Download .txt</button>
    </div>
    <textarea id="boxScorePreview" readonly style="margin-top:10px; min-height:220px; font-size:11px;">${escAttr(buildGameReportText())}</textarea>
  </div>`;

  html += `<div class="card">
    <div class="section-label">Export (${state.plays.length} plays)</div>
    <div class="hint">Generic headers — map to Hudl's fields in Hudl's own import step (Video &gt; Library &gt; Import Data). PAT/2PT rows export with ODK = "K" for Hudl, even though they're tracked as "PAT" here for your own clarity. ${sinceExport>0 ? `<span class="export-warn">${sinceExport} play${sinceExport!==1?'s':''} since your last export/share.</span>` : ''}</div>
    ${canWebShare ? `<button class="log-btn" onclick="shareCSV()">Share CSV (Notes, Mail, AirDrop...)</button>
    <button class="undo-btn" onclick="downloadCSV()" style="color:var(--text); margin-top:10px;">Download CSV instead</button>` : `<button class="log-btn" onclick="downloadCSV()">Download CSV</button>
    <div class="hint">This browser doesn't support one-tap file sharing — attach the downloaded file manually in Mail.</div>`}
  </div>

  <div class="card">
    <div class="section-label">Data Dictionary</div>
    <div class="hint">A plain-text legend of every column and every possible value — hand this to whoever's mapping columns during Hudl's import, so that stays fast and consistent week to week instead of re-guessing what "ToBoundary" or a specific stunt name means.</div>
    ${canWebShare ? `<button class="log-btn" onclick="shareDataDictionary()">Share Data Dictionary</button>
    <button class="undo-btn" onclick="downloadDataDictionary()" style="color:var(--text); margin-top:10px;">Download instead</button>` : `<button class="log-btn" onclick="downloadDataDictionary()">Download Data Dictionary</button>`}
  </div>`;

  const reviewRows = getReviewRows();
  const selectedCount = Object.keys(state.reviewSelected).filter(k=>state.reviewSelected[k] && state.plays[k]).length;

  html += `<div class="card">
    <div class="section-label">Review &amp; Edit All Plays (${state.plays.length})</div>
    <div class="hint">Everything here is editable — fix a bad Hudl import, or correct a live-tagged mistake. Changes save immediately as you tab away from a field. Good for fixing Hash, Direction, Formation, Player, and similar fields on any past play without disturbing anything else. <b>Caution:</b> editing TD/Turnover/Safety on an already-logged play does <b>not</b> recompute down/distance/possession for the plays after it — if the mistake is one of those three, it's usually safer to use "Undo Last Play" repeatedly back to that point on the Tag tab instead.</div>
    <div class="row-btns" style="margin-top:8px;">
      <button class="btn-secondary" onclick="setTab('tag')">Back to Tagging</button>
    </div>
    <div style="display:flex; align-items:center; gap:8px; margin-top:8px;">
      <input type="checkbox" id="filterUnknownCheck" ${state.reviewFilterUnknown?'checked':''} onchange="toggleReviewFilterUnknown()">
      <label for="filterUnknownCheck" style="font-size:13px;">Show only rows with a "?" in them (${state.plays.filter(hasUnknownValue).length} found)</label>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Batch Edit</div>
    <div class="hint" style="margin-top:0;">Select rows below with their checkbox, pick a field and value here, then apply to all of them at once — handy for fixing a stretch of plays that got mistagged the same way.</div>
    <div class="row-btns" style="margin-bottom:8px;">
      <button class="btn-secondary" onclick="reviewSelectAllVisible()">Select All Visible</button>
      <button class="btn-secondary" onclick="reviewSelectNone()">Select None</button>
    </div>
    <div class="row-btns" style="margin-bottom:8px;">
      <select id="batchFieldSelect" style="flex:1; padding:10px; border-radius:8px; background:var(--panel); color:var(--text); border:1px solid var(--line);" onchange="setBatchEditField(this.value)">
        <option value="">— field —</option>
        ${BATCH_EDIT_FIELDS.map(f=>`<option value="${f.key}" ${state.batchEditField===f.key?'selected':''}>${f.label}</option>`).join('')}
      </select>
      ${state.batchEditField ? `<select id="batchEditValueSelect" style="flex:1; padding:10px; border-radius:8px; background:var(--panel); color:var(--text); border:1px solid var(--line);">
        ${(BATCH_EDIT_FIELDS.find(f=>f.key===state.batchEditField)||{options:[]}).options.map(v=>`<option value="${v}">${v}</option>`).join('')}
      </select>` : ''}
    </div>
    <button class="log-btn" onclick="applyBatchEdit()">Apply to ${selectedCount} Selected</button>
  </div>

function hudlOdk(p){ return p.odk === 'PAT' ? 'K' : p.odk; }

function describePlay(p){
  const who = p.player || p.passer || p.tackler || '';
  const ydsPart = (p.gain!=null && p.gain!=='') ? `${p.gain} yd ` : '';
  return `${who?who+' ':''}${ydsPart}${p.playType}`.trim();
}

// Finds the side (O/D) that was driving right before a K-tagged row, for FG attribution
// when that kick wasn't part of the TD -> PAT -> Kickoff chain (which already knows via pendingReceiver).
function mostRecentOffenseSide(idx){
  for(let j=idx-1;j>=0;j--){
    if(state.plays[j].odk==='O' || state.plays[j].odk==='D') return state.plays[j].odk;
  }
  return null;
}

function computeScoring(){
  let yourScore = 0, oppScore = 0;
  const scoringEvents = [];
  state.plays.forEach((p, idx) => {
    if(p.isSafety && (p.odk==='O' || p.odk==='D')){
      const scoringSide = flipOdk(p.odk); // the side that did NOT give up the safety scores
      if(scoringSide==='O') yourScore += 2; else oppScore += 2;
      scoringEvents.push({ quarter: p.quarter, desc: `${scoringSide==='O'?state.teamName:state.opponentName} Safety`, yourScore, oppScore });
    }
    if(p.isTD && (p.odk==='O' || p.odk==='D')){
      if(p.odk==='O') yourScore += 6; else oppScore += 6;
      scoringEvents.push({ quarter: p.quarter, desc: `${p.odk==='O'?state.teamName:state.opponentName} TD — ${describePlay(p)}`, yourScore, oppScore });
    }
    if(p.odk==='PAT' && p.result==='Good'){
      const scoringSide = p.pendingReceiver ? flipOdk(p.pendingReceiver) : null;
      const pts = p.playType === 'PAT Kick' ? 1 : 2;
      if(scoringSide==='O') yourScore += pts;
      else if(scoringSide==='D') oppScore += pts;
      scoringEvents.push({ quarter: p.quarter, desc: `${scoringSide==='O'?state.teamName:(scoringSide==='D'?state.opponentName:'?')} ${p.playType} — ${p.result}`, yourScore, oppScore });
    }
    if(p.playType==='FG' && p.result==='Good'){
      const side = p.drivingSide || mostRecentOffenseSide(idx) || p.odk;
      if(side==='O') yourScore += 3;
      else if(side==='D') oppScore += 3;
      scoringEvents.push({ quarter: p.quarter, desc: `${side==='O'?state.teamName:state.opponentName} Field Goal — Good`, yourScore, oppScore });
    }
  });
  return { yourScore, oppScore, scoringEvents };
}

function buildGameReportText(){
  const scoring = computeScoring();
  const d = computeBoxScoreData();
  const quarters = ['1','2','3','4','OT'];
  const qp = {}; quarters.forEach(q=>qp[q]={you:0,opp:0});
  let runYou=0, runOpp=0;
  scoring.scoringEvents.forEach(ev=>{
    const q = String(ev.quarter);
    if(qp[q]){ qp[q].you += (ev.yourScore-runYou); qp[q].opp += (ev.oppScore-runOpp); }
    runYou = ev.yourScore; runOpp = ev.oppScore;
  });
  const usedQuarters = quarters.filter(q => qp[q].you || qp[q].opp || state.plays.some(p=>String(p.quarter)===q));
  const finalQuarters = usedQuarters.length ? usedQuarters : ['1'];

  const lines = [];
  lines.push(`GAME REPORT`);
  lines.push(`${state.teamName} vs. ${state.opponentName}${state.gameDate ? '  ·  '+state.gameDate : ''}`);
  lines.push('');
  lines.push(['', ...finalQuarters.map(q=>`Q${q}`), 'Final'].join('\t'));
  lines.push([state.teamName, ...finalQuarters.map(q=>qp[q].you), scoring.yourScore].join('\t'));
  lines.push([state.opponentName, ...finalQuarters.map(q=>qp[q].opp), scoring.oppScore].join('\t'));
  lines.push('');

  lines.push('SCORING SUMMARY');
  if(scoring.scoringEvents.length){
    scoring.scoringEvents.forEach(ev=>{
      lines.push(`Q${ev.quarter}  ${ev.desc}  (${ev.yourScore}-${ev.oppScore})`);
    });
  } else {
    lines.push('(no scoring plays logged)');
  }
  lines.push('');

  lines.push('TEAM TOTALS (Offense)');
  const totalSafeties = state.plays.filter(r=>r.isSafety).length;
  lines.push(`Total Yards: ${d.totalYards}    Avg/Play: ${d.avgPerPlay.toFixed(1)}    TDs: ${d.totalTDs}    Turnovers: ${d.totalTOs}    Safeties: ${totalSafeties}    Penalties: ${d.penaltyCount}`);
  lines.push('');

  if(Object.keys(d.rush).length){
    lines.push('RUSHING');
    Object.entries(d.rush).sort((a,b)=>b[1].yards-a[1].yards).forEach(([name,s])=>{
      lines.push(`  ${name}: ${s.plays} car, ${s.yards} yds, ${(s.yards/s.plays).toFixed(1)} avg, ${s.tds} TD`);
    });
    lines.push('');
  }
  if(Object.keys(d.pass).length){
    lines.push('PASSING');
    Object.entries(d.pass).forEach(([name,s])=>{
      lines.push(`  ${name}: ${d.passCompletions[name]}/${s.plays}, ${s.yards} yds, ${s.tds} TD`);
    });
    lines.push('');
  }
  if(Object.keys(d.rec).length){
    lines.push('RECEIVING');
    Object.entries(d.rec).sort((a,b)=>b[1].yards-a[1].yards).forEach(([name,s])=>{
      lines.push(`  ${name}: ${s.plays} rec, ${s.yards} yds, ${s.tds} TD`);
    });
    lines.push('');
  }
  if(Object.keys(d.tack).length){
    lines.push('TACKLES');
    Object.entries(d.tack).sort((a,b)=>b[1]-a[1]).forEach(([name,c])=>{
      lines.push(`  ${name}: ${c}`);
    });
    lines.push('');
  }

  lines.push('PLAY BY PLAY');
  state.plays.forEach(p=>{
    if(p.playType === 'No Play'){
      lines.push(`Q${p.quarter} | NO PLAY (camera/situation — no action)`);
      return;
    }
    const dd = (p.down!=null && p.distance!=null) ? `${p.down} & ${p.distance}` : p.odk;
    const who = p.player || p.passer || p.tackler || '';
    const gainTxt = (p.gain!=null && p.gain!=='') ? `${p.gain} yds` : '';
    const clockTxt = p.clock ? `@${p.clock}` : '';
    const yardTxt = p.yardLine ? `(${p.yardLine})` : '';
    lines.push(`Q${p.quarter} ${clockTxt} | ${p.odk} | ${dd} ${yardTxt} | ${p.playType}${who?' — '+who:''} ${gainTxt}${p.isTD?' TOUCHDOWN':''}${p.isSafety?' SAFETY':''}${p.isTurnover?' TURNOVER':''}${p.result?' ('+p.result+')':''}${p.notes?' ['+p.notes+']':''}`.replace(/\s+/g,' ').trim());
  });

  return lines.join('\n');
}

function buildCSVString(){
  const headers = ['ODK','Formation','Play','Down','Distance','Gain','PlayType','Hash','Direction','ToStrength','ToBoundary','ToTE','ToFB','Motion','MotionToStrength','MotionToBoundary','Front','Coverage','Stunt','StuntCall','FoulBy','FoulType','PenaltyResult','SpotOfFoul','KickingTeam','Clock','YardLine','BallCarrier','Passer','Receiver','Tackler','Result','TD','Turnover','Safety','Notes','InternalODK','PendingReceiver','DrivingSide'];
  const lines = [headers.join(',')];
  state.plays.forEach(p=>{
    lines.push([hudlOdk(p),p.formation,p.play,p.down,p.distance,p.gain,p.playType,p.hash,p.direction,p.tostrength,p.toBoundary,p.toTE,p.toFB,p.motion,p.motionToStrength,p.motionToBoundary,p.front,p.coverage,p.stunt,p.stuntCall,p.foulBy,p.foulType,p.penaltyResult,p.spotOfFoul,p.kickingTeam,p.clock,p.yardLine,p.player,p.passer,p.receiver,p.tackler,p.result,p.isTD?'Y':'',p.isTurnover?'Y':'',p.isSafety?'Y':'',p.notes||'',p.odk,p.pendingReceiver||'',p.drivingSide||''].map(csvEscape).join(','));
  });
  return lines.join('\n');
}

  lines.push('MotionToStrength / MotionToBoundary — same idea as ToStrength/ToBoundary but for the direction of the motion itself, not the run.');
  lines.push('Front — defensive front: 30, 40, 50, or ?');
  lines.push('Coverage — defensive shell: Sky, Cloud, Lock, Trap, or ?');
  lines.push('Stunt — was a stunt/pressure run? YES / NO / ?');
  lines.push('StuntCall — the specific call. 30-front calls: ' + STUNTS_30.filter(s=>s!=='?'&&s!=='Other (type below)').join(', ') + '.');
  lines.push('  40-front calls: ' + STUNTS_40.filter(s=>s!=='?'&&s!=='Other (type below)').join(', ') + '.');
  lines.push('FoulBy — Offense or Defense (which side committed the penalty), or ?');
  lines.push('FoulType — the specific foul. Common ones: ' + PENALTY_FOUL_TYPES.filter(s=>s!=='?'&&s!=='Other (type below)').join(', ') + '.');
  lines.push('PenaltyResult — 5/10/15 Yards, Loss of Down, Automatic First Down, Offsetting, Declined, No Play, or ?');
  lines.push('SpotOfFoul — free text, e.g. "OWN 35".');
  lines.push('BallCarrier / Passer / Receiver / Tackler — player names from Our Roster (Offense) or the Opponent Roster (Defense), or "Other" if not on the list.');
  lines.push('Result — Good/No Good (FG, PAT) or a free-text play result.');

const HUDL_MAP_FIELDS = [
  {key:'Formation', label:'Formation'},
  {key:'Down', label:'Down'},
  {key:'Distance', label:'Distance (To Go)'},
  {key:'Gain', label:'Gain / Yards'},
  {key:'PlayType', label:'Play Type'},
  {key:'Hash', label:'Hash'},
  {key:'Direction', label:'Direction'},
  {key:'Result', label:'Result'},
  {key:'BallCarrier', label:'Player'},
  {key:'Notes', label:'Notes'},
];

function guessHudlColumn(key, headers){
  const patterns = {
    Formation: /formation/i, Down: /^down$/i, Distance: /to ?go|distance/i, Gain: /yard|yds|gain/i,
    PlayType: /type|play/i, Hash: /hash/i, Direction: /direction|^dir$/i,
    Result: /result/i, BallCarrier: /player/i, Notes: /note/i, __team: /team/i,
  };
  const re = patterns[key];
  if(!re) return '';
  const found = headers.find(h=>re.test(h));
  return found || '';
}

function handleHudlFileUpload(inputEl){
  const file = inputEl.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n').map(l=>l.replace(/\r$/,'')).filter(l=>l.trim()!=='');
    if(lines.length < 2){ alert('That file has no data rows to import.'); return; }
    const headers = parseCSVLine(lines[0]);
    const rows = lines.slice(1).map(parseCSVLine);
    const mapping = {};
    const remembered = state.lastHudlMapping;
    HUDL_MAP_FIELDS.forEach(f=>{
      const rememberedHeader = remembered && remembered.mapping[f.key];
      mapping[f.key] = (rememberedHeader && headers.includes(rememberedHeader)) ? rememberedHeader : guessHudlColumn(f.key, headers);
    });
    const rememberedTeamCol = remembered && remembered.teamCol;
    const teamCol = (rememberedTeamCol && headers.includes(rememberedTeamCol)) ? rememberedTeamCol : guessHudlColumn('__team', headers);
    state.hudlImport = { headers, rows, mapping, teamCol, teamOValue: (remembered && remembered.teamOValue) || '', teamDValue: (remembered && remembered.teamDValue) || '' };
    render();
  };
  reader.readAsText(file);
}

function saveHudlMappingFile(){
  const hi = state.hudlImport;
  if(!hi) return;
  const payload = JSON.stringify({ mapping: hi.mapping, teamCol: hi.teamCol, teamOValue: hi.teamOValue, teamDValue: hi.teamDValue }, null, 2);
  const blob = new Blob([payload], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'hudl_column_mapping.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function loadHudlMappingFile(inputEl){
  const file = inputEl.files[0];
  if(!file || !state.hudlImport) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const saved = JSON.parse(e.target.result);
      const hi = state.hudlImport;
      Object.keys(saved.mapping || {}).forEach(k=>{
        if(saved.mapping[k] && hi.headers.includes(saved.mapping[k])) hi.mapping[k] = saved.mapping[k];
      });
      if(saved.teamCol && hi.headers.includes(saved.teamCol)) hi.teamCol = saved.teamCol;
      if(saved.teamOValue) hi.teamOValue = saved.teamOValue;
      if(saved.teamDValue) hi.teamDValue = saved.teamDValue;
      render();
    } catch(err){
      alert('Could not read that mapping file — it may not be a valid saved mapping.');
    }
  };
  reader.readAsText(file);
}

function setHudlMapping(field, headerVal){ state.hudlImport.mapping[field] = headerVal; render(); }
function setHudlTeamCol(val){ state.hudlImport.teamCol = val; state.hudlImport.teamOValue=''; state.hudlImport.teamDValue=''; render(); }
function setHudlTeamValue(which, val){ state.hudlImport[which] = val; }

function distinctHudlTeamValues(){
  const hi = state.hudlImport;
  if(!hi || !hi.teamCol) return [];
  const i = hi.headers.indexOf(hi.teamCol);
  if(i < 0) return [];
  return [...new Set(hi.rows.map(r=>(r[i]||'').trim()).filter(Boolean))].slice(0, 8);
}

function commitHudlImport(){
  const hi = state.hudlImport;
  const {headers, rows, mapping, teamCol, teamOValue, teamDValue} = hi;
  const hIdx = h => headers.indexOf(h);
  const teamColIdx = teamCol ? hIdx(teamCol) : -1;
  const imported = rows.map(cols=>{
    const get = (field) => { const h = mapping[field]; if(!h) return ''; const i = hIdx(h); return i>=0 ? (cols[i]||'').trim() : ''; };
    let odk = '';
    if(teamColIdx >= 0){
      const raw = (cols[teamColIdx]||'').trim();
      if(teamOValue && raw === teamOValue) odk = 'O';
      else if(teamDValue && raw === teamDValue) odk = 'D';
    }
    const downRaw = get('Down'), distRaw = get('Distance'), gainRaw = get('Gain');
    const downN = parseInt(downRaw), distN = parseInt(distRaw), gainN = parseInt(gainRaw);
    return {
      odk, formation: get('Formation'), play: '',
      down: !isNaN(downN) ? downN : null,
      distance: !isNaN(distN) ? distN : null,
      gain: !isNaN(gainN) ? gainN : undefined,
      playType: get('PlayType'), hash: get('Hash'), direction: get('Direction'),
      tostrength:'', toTE:'', toFB:'', result: get('Result'),
      player: get('BallCarrier'), passer:'', receiver:'', tackler:'',
      isTD:false, isTurnover:false, isSafety:false,
      notableEvent:'', notes: get('Notes'),
      pendingReceiver:null, quarter: state.quarter, drivingSide: (odk==='O'||odk==='D') ? odk : null,
    };
  });
  state.plays = state.plays.concat(imported);
  state.lastHudlMapping = { mapping: {...mapping}, teamCol, teamOValue, teamDValue };
  state.hudlImport = null;
  state.nextSituation = computeNextSituation(lastPlay());
  state.cur = state.nextSituation.forcedOdk ? { odk: state.nextSituation.forcedOdk } : {};
  render();
  alert(`Imported ${imported.length} plays from Hudl. Scroll down to Review & Edit to fix anything before exporting.`);
}

function cancelHudlImport(){ state.hudlImport = null; render(); }

// Generic inline editing for any already-logged play (imported or manually tagged).
function updatePlayField(idx, field, rawValue){
  const p = state.plays[idx];
  if(!p) return;
  if(field==='down' || field==='distance' || field==='gain'){
    if(rawValue === ''){ p[field] = field==='gain' ? undefined : null; }
    else { const n = parseInt(rawValue); if(!isNaN(n)) p[field] = n; }
  } else {
    p[field] = rawValue;
  }
  render();
}
function deletePlayAt(idx){
  state.plays.splice(idx, 1);
  state.reviewSelected = {}; // indices shift after a delete -- clear rather than risk pointing at the wrong row
  render();
}

// ---- Review & Edit: filter to unresolved "?" rows, multi-select, batch edit ----
const BATCH_EDIT_FIELDS = [
  {key:'odk', label:'ODK', options:['O','D','K','PAT']},
  {key:'hash', label:'Hash', options:['L','M','R','?']},
  {key:'direction', label:'Direction', options:['L','M','R','?']},
  {key:'tostrength', label:'To Strength', options:['YES','NO','NOT ON FIELD','?']},
  {key:'toBoundary', label:'To Boundary/Field', options:['Boundary','Field','Middle','?']},
  {key:'front', label:'Front', options:['30','40','50','?']},
  {key:'coverage', label:'Coverage', options:['Sky','Cloud','Lock','Trap','?']},
  {key:'stunt', label:'Stunt', options:['YES','NO','?']},
];

function hasUnknownValue(p){
  const fields = ['hash','direction','tostrength','toBoundary','toTE','toFB','motion','motionToStrength','motionToBoundary','front','coverage','stunt'];
  return fields.some(f => p[f] === '?');
}
function getReviewRows(){
  return state.plays.map((p,i)=>({p,i})).filter(r => !state.reviewFilterUnknown || hasUnknownValue(r.p));
}
function toggleReviewFilterUnknown(){ state.reviewFilterUnknown = !state.reviewFilterUnknown; render(); }
function toggleReviewSelect(i){ state.reviewSelected[i] = !state.reviewSelected[i]; render(); }
function reviewSelectAllVisible(){
  getReviewRows().forEach(r => { state.reviewSelected[r.i] = true; });
  render();
}
function reviewSelectNone(){ state.reviewSelected = {}; render(); }
function setBatchEditField(field){ state.batchEditField = field; state.batchEditValue = ''; render(); }
function applyBatchEdit(){
  const field = state.batchEditField;
  const valueSelect = document.getElementById('batchEditValueSelect');
  const value = valueSelect ? valueSelect.value : '';
  if(!field || !value){ alert('Pick a field and a value first.'); return; }
  const selectedIdxs = Object.keys(state.reviewSelected).filter(k => state.reviewSelected[k] && state.plays[k]);
  if(!selectedIdxs.length){ alert('No rows selected — tap the checkboxes on the rows you want to change first.'); return; }
  selectedIdxs.forEach(i => { state.plays[i][field] = value; });
  state.lastActionNote = `Batch-updated ${field} on ${selectedIdxs.length} play${selectedIdxs.length!==1?'s':''}.`;
  render();
}

function importCSV(inputEl){
  const file = inputEl.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n').map(l=>l.trim()).filter(Boolean);
    if(lines.length < 2){ alert('That file has no play rows to restore.'); return; }
    const restored = lines.slice(1).map(line=>{
      const c = parseCSVLine(line);
      const down = c[3]!==undefined && c[3]!=='' ? parseInt(c[3]) : null;
      const distance = c[4]!==undefined && c[4]!=='' ? parseInt(c[4]) : null;
      return {
        // c[36] (InternalODK) preserves 'PAT' distinctly from the Hudl-mapped 'K' in c[0]; fall back to c[0] for older exports.
        odk: c[36] || c[0] || '',
        formation:c[1]||'', play:c[2]||'',
        down: isNaN(down) ? null : down,
        distance: isNaN(distance) ? null : distance,
        gain: c[5]!==undefined && c[5]!=='' ? parseInt(c[5]) : undefined,
        playType:c[6]||'', hash:c[7]||'', direction:c[8]||'', tostrength:c[9]||'',
        toBoundary:c[10]||'', toTE:c[11]||'', toFB:c[12]||'',
        motion:c[13]||'', motionToStrength:c[14]||'', motionToBoundary:c[15]||'',
        front:c[16]||'', coverage:c[17]||'', stunt:c[18]||'', stuntCall:c[19]||'',
        foulBy:c[20]||'', foulType:c[21]||'', penaltyResult:c[22]||'', spotOfFoul:c[23]||'',
        kickingTeam:c[24]||'',
        clock:c[25]||'', yardLine:c[26]||'',
        player:c[27]||'', passer:c[28]||'', receiver:c[29]||'', tackler:c[30]||'',
        result:c[31]||'', isTD: c[32]==='Y', isTurnover: c[33]==='Y', isSafety: c[34]==='Y',
        notes: c[35] || '',
        pendingReceiver: c[37] || null,
        drivingSide: c[38] || null,
      };
    });
    state.plays = restored;
    state.lastExportAt = restored.length;
    state.nextSituation = computeNextSituation(lastPlay());
    state.cur = state.nextSituation.forcedOdk ? { odk: state.nextSituation.forcedOdk } : {};
    state.lastActionNote = '';
    render();
    alert('Restored ' + restored.length + ' plays. You can keep tagging from here.');
  };
  reader.readAsText(file);
}

// ---------------- MAIN RENDER ----------------
function render(){
  const ns = state.nextSituation;
  const isScout = state.appMode === 'scout';
  document.getElementById('tab-tag').textContent = state.contentMode === 'tag' ? 'Tag' : state.contentMode === 'stats' ? 'Stats' : 'Tag/Stats';
  document.getElementById('sbDD').textContent = ns.mode === 'dd' ? fmtDD(ns.down, ns.distance) : ns.label;
  document.getElementById('sbSub').textContent = isScout
    ? `Play ${state.plays.length+1} · ${state.plays.length} tagged`
    : `Play ${state.plays.length+1} · ${state.plays.length} logged`;
  document.getElementById('sbLabel').textContent = state.editingStart ? 'Manual Override' : (isScout ? 'Situation' : 'Next Snap');
  document.getElementById('sbDD').style.textShadow = isScout ? 'none' : '0 0 18px rgba(255,182,39,.35)';

  const drive = computeDriveInfo();
  const driveFlagEl = document.getElementById('sbDriveFlag');
  if(drive.side === 'O' || drive.side === 'D'){
    driveFlagEl.textContent = `${drive.side} DRIVE: ${drive.driveNumber}  PLAY: ${drive.playInDrive}  |  PLAY ${drive.totalPlayNumber}`;
  } else {
    driveFlagEl.textContent = `PLAY ${drive.totalPlayNumber}`;
  }
  document.getElementById('sbFieldDirBtn').textContent = state.fieldDirection === 'right' ? 'O driving → (tap to flip)' : '← O driving (tap to flip)';

  const offRows = state.plays.filter(p=>p.odk==='O' && ['Run','Pass','Sack'].includes(p.playType));
  const yds = offRows.reduce((s,r)=>s+(r.gain||0),0);
  const tds = state.plays.filter(r=>r.isTD).length;
  const tos = state.plays.filter(r=>r.isTurnover).length;
  document.getElementById('sbTeamStats').textContent = `${yds} yds · ${tds} TD · ${tos} TO`;
  document.getElementById('sbQuarter').innerHTML = ['1','2','3','4','OT'].map(q=>
    `<button class="tile small" style="min-height:32px; padding:4px 8px; font-size:12px; ${String(state.quarter)===q?'selected':''}" onclick="setQuarter('${q}')">Q${q}</button>`
  ).join('');
  const sinceExport = state.plays.length - state.lastExportAt;
  const sbEl = document.getElementById('sbSub');
  const exportReminderThreshold = isScout ? 20 : 8; // less urgent when reviewing film at your own pace
  if(sinceExport >= exportReminderThreshold){
    sbEl.innerHTML = sbEl.textContent + ` <span style="color:var(--amber);">· ${sinceExport} plays unsaved — export soon</span>`;
  }

  let scoreboardExtra = '';
  if(state.editingStart){
    const dispDown = ns.mode === 'dd' ? ns.down : state.manualDown;
    const dispDist = ns.mode === 'dd' ? ns.distance : state.manualDistance;
    scoreboardExtra = `<div class="sb-row" style="margin-top:10px;">
      <div style="display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
        <span class="sb-sub">Down</span>
        <button class="tile small" style="min-height:36px; width:44px;" onclick="bumpManual('down',-1)">-</button>
        <span style="font-weight:800; font-size:18px;">${dispDown}</span>
        <button class="tile small" style="min-height:36px; width:44px;" onclick="bumpManual('down',1)">+</button>
        <span class="sb-sub" style="margin-left:14px;">Distance</span>
        <button class="tile small" style="min-height:36px; width:44px;" onclick="bumpManual('distance',-1)">-</button>
        <span style="font-weight:800; font-size:18px;">${dispDist}</span>
        <button class="tile small" style="min-height:36px; width:44px;" onclick="bumpManual('distance',1)">+</button>
      </div>
      ${ns.mode !== 'dd' ? `<div class="sb-sub" style="margin-top:6px;">Currently in a special situation (${ns.label}) — adjusting Down/Distance will override it back to a normal snap.</div>` : ''}
    </div>`;
  }
  let existingExtra = document.getElementById('sbExtra');
  if(!existingExtra){
    existingExtra = document.createElement('div');
    existingExtra.id = 'sbExtra';
    document.querySelector('.scoreboard').appendChild(existingExtra);
  }
  existingExtra.innerHTML = scoreboardExtra;

  let html = '';
  if(state.tab==='tag') html = renderTagTab();
  else if(state.tab==='tendencies') html = renderTendenciesTab();
  else if(state.tab==='boxscore') html = renderBoxScoreTab();
  else if(state.tab==='setup') html = renderSetupTab();
  else if(state.tab==='export') html = renderExportTab();
  document.getElementById('main').innerHTML = html;
}

render();
</script>
